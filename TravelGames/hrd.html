
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Roller's Duel - Elite Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --felt-green: #0a4821;
            --gold: #d4af37;
            --gold-light: #ffd700;
            --light-gold: #fff8e1;
            --glass: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #1a0f12;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: var(--light-gold);
        }

        .casino-container {
            background: var(--felt-green);
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            border: 8px solid #3d2529;
            box-shadow: 0 0 0 2px var(--gold), 0 20px 40px rgba(0,0,0,0.8);
            border-radius: 24px;
            width: 98vw;
            height: 98vh;
            max-width: 420px;
            max-height: 800px;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 10px;
        }

        .cinzel { font-family: 'Cinzel', serif; }

        /* Side-by-Side Vitality Dashboard */
        .duel-dashboard {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
            position: relative;
        }

        .vs-badge {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #3d2529;
            border: 1px solid var(--gold);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            color: var(--gold);
            z-index: 10;
        }

        .player-status {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
            transition: all 0.3s ease;
            padding: 8px;
            border-radius: 12px;
        }

        .player-status.active-turn {
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .orb-container {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: #111;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .orb-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .orb-wave {
            position: absolute;
            top: -8px;
            left: -50%;
            width: 200%;
            height: 16px;
            background: rgba(255,255,255,0.25);
            border-radius: 38%;
            animation: wave 4s infinite linear;
        }

        @keyframes wave {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hp-label { font-size: 7px; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; margin-top: 2px; }
        .hp-val { font-family: 'Cinzel', serif; font-size: 14px; color: white; line-height: 1; }
        .cp-val { font-size: 10px; color: var(--gold); font-weight: bold; margin-top: 2px; }

        /* Gameplay Areas */
        .dice-tray {
            flex: 1;
            background: rgba(0,0,0,0.1);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 0;
            overflow: hidden;
        }

        .die {
            aspect-ratio: 1/1;
            background: #fff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1a0f12;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 0 #999;
            transition: all 0.1s;
        }
        .die.held {
            background: var(--gold-light);
            box-shadow: 0 0 12px var(--gold-light), 0 2px 0 #b8860b;
            transform: translateY(-4px);
        }
        .die.rolling { animation: shake 0.1s infinite; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -1px) rotate(1deg); }
            75% { transform: translate(1px, -1px) rotate(-1deg); }
            100% { transform: translate(-1px, 1px) rotate(0deg); }
        }

        .moves-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .combo-btn {
            padding: 6px 4px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            opacity: 0.2;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        .combo-btn.active {
            opacity: 1;
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.12);
            cursor: pointer;
            pointer-events: auto;
        }
        .combo-btn b { font-size: 10px; color: white; }
        .combo-btn span { font-size: 9px; color: var(--gold); font-weight: bold; }

        .btn-gold {
            background: radial-gradient(circle, var(--gold-light), var(--gold));
            color: #2a1a1f;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #5c430d;
            font-size: 14px;
        }
        .btn-gold:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #5c430d; }

        .modal {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="casino-container">
        <!-- SIDE BY SIDE DASHBOARD -->
        <div class="duel-dashboard">
            <div class="vs-badge">VS</div>
            
            <!-- House / P2 -->
            <div id="status-p2" class="player-status">
                <div class="hp-label text-red-400" id="p2-label">The House</div>
                <div class="orb-container border-red-500">
                    <div id="p2-orb-fill" class="orb-fill bg-red-600" style="height: 100%">
                        <div class="orb-wave"></div>
                    </div>
                </div>
                <div id="p2-hp-text" class="hp-val">50</div>
                <div id="p2-cp-container" class="hidden cp-val">CREDITS: <span id="p2-cp">0</span></div>
            </div>

            <!-- Shark / P1 -->
            <div id="status-p1" class="player-status">
                <div class="hp-label text-teal-400">The Shark</div>
                <div class="orb-container border-teal-500">
                    <div id="p1-orb-fill" class="orb-fill bg-teal-500" style="height: 100%">
                        <div class="orb-wave"></div>
                    </div>
                </div>
                <div id="p1-hp-text" class="hp-val">50</div>
                <div class="cp-val cursor-pointer" onclick="openShop(1)">CREDITS: <span id="p1-cp">0</span></div>
            </div>
        </div>

        <div id="game-log" class="text-center text-[10px] uppercase tracking-widest text-gold/60 italic">Waiting for table buy-in...</div>

        <!-- DICE AREA -->
        <div class="dice-tray">
            <div id="dice-grid" class="grid grid-cols-5 gap-2 mb-4"></div>
        </div>

        <!-- ROLL CONTROLS — always visible, never overlapped -->
        <div class="flex flex-col items-center gap-2 flex-shrink-0">
            <div class="bg-black/40 px-3 py-1 rounded-full border border-white/10">
                <span id="roll-count" class="text-[10px] font-bold text-zinc-400">ROLLS: 3/3</span>
            </div>
            <button id="roll-btn" class="btn-gold" onclick="handleRoll()">Roll Dice</button>
            <button id="end-roll-btn" class="hidden text-[10px] text-white/50 underline uppercase" onclick="skipRolling()">Attack Now</button>
        </div>

        <!-- COMBAT MOVES -->
        <div class="bg-black/30 px-3 py-2 rounded-xl border border-gold/10 flex-shrink-0">
            <p class="text-[9px] uppercase text-zinc-500 font-bold tracking-widest mb-2">Maneuvers</p>
            <div id="moves-list" class="grid grid-cols-4 gap-1">
                <button id="combo-straight" class="combo-btn" onclick="performAttack('Straight', 12)">
                    <b>Straight</b>
                    <span>12 DMG</span>
                </button>
                <button id="combo-fullhouse" class="combo-btn" onclick="performAttack('Full House', 8)">
                    <b>Full House</b>
                    <span>8 DMG</span>
                </button>
                <button id="combo-four" class="combo-btn" onclick="performAttack('Four Kind', 6)">
                    <b>Four Kind</b>
                    <span>6 DMG</span>
                </button>
                <button id="combo-base" class="combo-btn" onclick="performAttack('Low Stakes', 2)">
                    <b>Low Stakes</b>
                    <span>2 DMG</span>
                </button>
            </div>
        </div>

        <!-- MODALS -->
        <div id="mode-modal" class="modal">
            <div class="bg-[#2a1a1f] border-2 border-gold p-8 rounded-2xl w-full max-w-xs shadow-2xl text-center">
                <h1 class="cinzel text-3xl text-gold mb-1">Elite Duel</h1>
                <p class="text-[10px] text-zinc-500 mb-8 uppercase tracking-[0.2em]">Select Arena</p>
                <div class="space-y-4">
                    <button class="w-full bg-white/5 border border-white/10 p-5 rounded-xl text-left hover:bg-white/10" onclick="startGame('ai')">
                        <span class="block font-bold">Solo vs House</span>
                        <span class="text-[10px] text-zinc-500">Beat the dealer's hand.</span>
                    </button>
                    <button class="w-full bg-white/5 border border-white/10 p-5 rounded-xl text-left hover:bg-white/10" onclick="startGame('pvp')">
                        <span class="block font-bold">Local Duel</span>
                        <span class="text-[10px] text-zinc-500">Pass-and-play PvP.</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="shop-modal" class="modal hidden">
            <div class="bg-[#1a0f12] border border-gold p-8 rounded-2xl w-full max-w-xs">
                <h2 class="cinzel text-xl text-gold mb-6" id="shop-title">Shop</h2>
                <button class="w-full bg-teal-900/20 border border-teal-500/50 p-4 rounded-xl flex justify-between items-center mb-6" onclick="buyHeal()">
                    <div class="text-left">
                        <p class="text-teal-400 font-bold">Heal Vitality</p>
                        <p class="text-[10px] opacity-60">+5 Health</p>
                    </div>
                    <span class="bg-gold text-black font-bold px-3 py-1 rounded text-xs">2 CP</span>
                </button>
                <button class="w-full text-zinc-500 text-[10px] uppercase font-bold" onclick="toggleModal('shop-modal', false)">Close Shop</button>
            </div>
        </div>

        <div id="result-modal" class="modal hidden">
            <h2 class="cinzel text-5xl text-gold mb-4" id="result-title">VICTORY</h2>
            <p class="text-white/60 mb-10" id="result-msg"></p>
            <button class="btn-gold" onclick="location.reload()">New Game</button>
        </div>
    </div>

    <script>
        const MAX_HP = 50;
        let gameMode = 'ai';
        let activePlayer = 1;
        let p1 = { hp: MAX_HP, cp: 0, name: "The Shark" };
        let p2 = { hp: MAX_HP, cp: 0, name: "The House" };
        let rollsLeft = 3;
        let dice = [1, 2, 3, 4, 5];
        let held = [false, false, false, false, false];
        let isRolling = false;

        function log(msg) { document.getElementById('game-log').innerText = msg; }
        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        function startGame(mode) {
            gameMode = mode;
            toggleModal('mode-modal', false);
            if (mode === 'pvp') {
                p2.name = "The Whale";
                document.getElementById('p2-label').innerText = "The Whale";
                document.getElementById('p2-cp-container').classList.remove('hidden');
            }
            startTurn();
        }

        function startTurn() {
            rollsLeft = 3;
            held = [false, false, false, false, false];
            if (activePlayer === 1) { p1.cp++; log(`${p1.name}'s turn.`); }
            else if (gameMode === 'pvp') { p2.cp++; log(`${p2.name}'s turn.`); }
            updateUI();
        }

        function updateUI() {
            document.getElementById('p1-hp-text').innerText = p1.hp;
            document.getElementById('p2-hp-text').innerText = p2.hp;
            document.getElementById('p1-orb-fill').style.height = (p1.hp / MAX_HP * 100) + '%';
            document.getElementById('p2-orb-fill').style.height = (p2.hp / MAX_HP * 100) + '%';
            document.getElementById('p1-cp').innerText = p1.cp;
            document.getElementById('p2-cp').innerText = p2.cp;

            document.getElementById('status-p1').classList.toggle('active-turn', activePlayer === 1);
            document.getElementById('status-p2').classList.toggle('active-turn', activePlayer === 2);

            document.getElementById('roll-count').innerText = `ROLLS: ${rollsLeft}/3`;
            document.getElementById('roll-btn').disabled = (rollsLeft === 0 || isRolling || (gameMode === 'ai' && activePlayer === 2));
            document.getElementById('end-roll-btn').classList.toggle('hidden', !(rollsLeft < 3 && rollsLeft > 0));

            const grid = document.getElementById('dice-grid');
            grid.innerHTML = '';
            dice.forEach((val, i) => {
                const d = document.createElement('div');
                const isFirstRoll = rollsLeft === 3;
                d.className = `die ${held[i] ? 'held' : ''} ${isFirstRoll ? 'pointer-events-none' : ''}`;
                d.innerText = val;
                d.onclick = () => toggleHold(i);
                grid.appendChild(d);
            });
            checkCombos();
        }

        function toggleHold(i) {
            if (isRolling || rollsLeft === 3) return;
            held[i] = !held[i];
            updateUI();
        }

        async function handleRoll() {
            if (rollsLeft <= 0 || isRolling) return;
            isRolling = true;
            rollsLeft--;
            const diceEls = document.querySelectorAll('.die');
            for (let f = 0; f < 8; f++) {
                diceEls.forEach((el, i) => {
                    if (!held[i]) {
                        dice[i] = Math.floor(Math.random() * 6) + 1;
                        el.innerText = dice[i];
                        el.classList.add('rolling');
                    }
                });
                await new Promise(r => setTimeout(r, 60));
            }
            diceEls.forEach(el => el.classList.remove('rolling'));
            isRolling = false;
            updateUI();
        }

        function skipRolling() { rollsLeft = 0; updateUI(); }

        function checkCombos() {
            const counts = {};
            dice.forEach(v => counts[v] = (counts[v] || 0) + 1);
            const vals = Object.values(counts);
            const sorted = [...new Set(dice)].sort((a, b) => a - b);
            const str = sorted.join('');
            
            const hasFour = vals.some(v => v >= 4);
            const hasFullHouse = (vals.includes(3) && vals.includes(2)) || vals.filter(v => v >= 3).length > 1;
            const isStraight = str.includes("12345") || str.includes("23456");

            const rolled = rollsLeft < 3;
            const canSelect = (gameMode === 'pvp' || activePlayer === 1) && rolled;
            
            setComboBtn('combo-four', hasFour && canSelect);
            setComboBtn('combo-fullhouse', hasFullHouse && canSelect);
            setComboBtn('combo-straight', isStraight && canSelect);
            setComboBtn('combo-base', canSelect); 
        }

        function setComboBtn(id, active) {
            const btn = document.getElementById(id);
            btn.classList.toggle('active', active);
        }

        async function performAttack(name, dmg) {
            if (activePlayer === 1) { p2.hp = Math.max(0, p2.hp - dmg); log(`${p1.name} uses ${name}!`); }
            else { p1.hp = Math.max(0, p1.hp - dmg); log(`${p2.name} uses ${name}!`); }
            updateUI();
            if (p1.hp <= 0 || p2.hp <= 0) { gameOver(); return; }
            activePlayer = activePlayer === 1 ? 2 : 1;
            await new Promise(r => setTimeout(r, 800));
            if (gameMode === 'ai' && activePlayer === 2) opponentTurn();
            else startTurn();
        }

        async function opponentTurn() {
            log("Dealer is rolling...");
            isRolling = true;
            await new Promise(r => setTimeout(r, 1000));
            dice = dice.map(() => Math.floor(Math.random() * 6) + 1);
            isRolling = false;
            const sum = dice.reduce((a, b) => a + b, 0);
            const dmg = sum > 18 ? 8 : (sum > 10 ? 5 : 2);
            p1.hp = Math.max(0, p1.hp - dmg);
            log(`The House hits for ${dmg}!`);
            updateUI();
            if (p1.hp <= 0) { gameOver(); return; }
            await new Promise(r => setTimeout(r, 1000));
            activePlayer = 1;
            startTurn();
        }

        function openShop(pNum) {
            if (isRolling || rollsLeft < 3) return;
            toggleModal('shop-modal', true);
        }

        function buyHeal() {
            let p = activePlayer === 1 ? p1 : p2;
            if (p.cp < 2 || p.hp >= MAX_HP) return;
            p.cp -= 2; p.hp = Math.min(MAX_HP, p.hp + 5);
            updateUI(); toggleModal('shop-modal', false);
        }

        function gameOver() {
            const win = p2.hp <= 0;
            document.getElementById('result-title').innerText = win ? "VICTORY" : "BUSTED";
            document.getElementById('result-msg').innerText = win ? "The Shark cleared the table." : "The House always wins.";
            toggleModal('result-modal', true);
        }

        window.onload = () => toggleModal('mode-modal', true);
    </script>
</body>
</html>
