<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline Caravan Level</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bubble-container { width: 250px; height: 250px; border-radius: 50%; border: 4px solid #334155; position: relative; background: #f1f5f9; overflow: hidden; }
        .bubble { width: 40px; height: 40px; border-radius: 50%; background: #ef4444; position: absolute; top: 50%; left: 50%; margin: -20px; transition: transform 0.1s ease-out; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .level-active { background: #22c55e !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

<div id="setup-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm space-y-6 text-center">
        <h1 class="text-3xl font-bold">Van Leveler</h1>
        <p class="text-slate-500 text-sm">Connect via Hotspot for offline use.</p>
        
        <div class="space-y-4">
            <div id="my-id-display" class="text-xs font-mono bg-slate-100 p-2 rounded hidden"></div>
            
            <button onclick="startSensor()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">📱 I am the SENSOR</button>
            
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink mx-4 text-slate-400 text-xs">OR</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <input id="target-id" type="text" placeholder="Enter Sensor ID" class="w-full p-3 border rounded-lg text-center font-mono">
            <button onclick="startDriver()" class="w-full bg-slate-800 text-white p-4 rounded-xl font-bold">🚗 I am the DRIVER</button>
        </div>
        <p id="status" class="text-xs text-amber-600 font-medium"></p>
    </div>
</div>

<div id="app-screen" class="hidden min-h-screen flex flex-col items-center p-6 space-y-8">
    <div class="text-center">
        <h2 id="role-title" class="text-lg font-bold">Initializing...</h2>
        <p id="peer-id-label" class="text-xs font-mono text-slate-400"></p>
    </div>

    <div class="bubble-container shadow-inner">
        <div class="absolute inset-0 flex items-center justify-center opacity-20">
            <div class="w-full h-px bg-slate-900"></div>
            <div class="h-full w-px bg-slate-900"></div>
            <div class="w-16 h-16 border-2 border-slate-900 rounded-full"></div>
        </div>
        <div id="bubble" class="bubble"></div>
    </div>

    <div class="grid grid-cols-2 gap-4 w-full max-w-sm">
        <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
            <div class="text-[10px] uppercase text-slate-400 font-bold">Pitch</div>
            <div id="val-pitch" class="text-2xl font-mono font-bold">0.0°</div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
            <div class="text-[10px] uppercase text-slate-400 font-bold">Roll</div>
            <div id="val-roll" class="text-2xl font-mono font-bold">0.0°</div>
        </div>
    </div>

    <button id="cal-btn" onclick="calibrate()" class="w-full max-w-sm bg-slate-200 p-4 rounded-xl font-bold hidden">Zero Sensor</button>
</div>

<script>
    let peer = null;
    let conn = null;
    let offset = { beta: 0, gamma: 0 };
    const bubble = document.getElementById('bubble');
    const status = document.getElementById('status');

    function initPeer(id = null) {
        status.innerText = "Starting connection...";
        peer = id ? new Peer(id) : new Peer();
        
        peer.on('open', (myId) => {
            document.getElementById('my-id-display').innerText = "ID: " + myId;
            document.getElementById('my-id-display').classList.remove('hidden');
            document.getElementById('peer-id-label').innerText = "Your ID: " + myId;
            status.innerText = "Ready. Share your ID with the driver.";
        });

        peer.on('error', (err) => {
            status.innerText = "Error: " + err.type;
            console.error(err);
        });
    }

    async function startSensor() {
        // Request iOS permissions
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res !== 'granted') return alert("Need sensor access");
        }

        initPeer();
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('role-title').innerText = "SENSOR MODE (In Caravan)";
        document.getElementById('cal-btn').classList.remove('hidden');

        peer.on('connection', (c) => {
            conn = c;
            status.innerText = "Driver connected!";
            setupOrientationListener();
        });
    }

    function startDriver() {
        const targetId = document.getElementById('target-id').value;
        if (!targetId) return alert("Enter the Sensor's ID first");

        initPeer();
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('role-title').innerText = "DRIVER MODE";

        setTimeout(() => {
            conn = peer.connect(targetId);
            conn.on('open', () => {
                status.innerText = "Connected to Sensor!";
            });
            conn.on('data', (data) => {
                updateUI(data.beta, data.gamma);
            });
        }, 1000);
    }

    function setupOrientationListener() {
        window.addEventListener('deviceorientation', (event) => {
            const data = {
                beta: (event.beta || 0) - offset.beta,
                gamma: (event.gamma || 0) - offset.gamma
            };
            updateUI(data.beta, data.gamma);
            if (conn && conn.open) {
                conn.send(data);
            }
        });
    }

    function updateUI(beta, gamma) {
        document.getElementById('val-pitch').innerText = beta.toFixed(1) + "°";
        document.getElementById('val-roll').innerText = gamma.toFixed(1) + "°";

        // Level logic
        const limit = 15;
        const x = Math.max(-limit, Math.min(limit, gamma)) * 8;
        const y = Math.max(-limit, Math.min(limit, beta)) * 8;
        
        bubble.style.transform = `translate(${x}px, ${y}px)`;
        
        if (Math.abs(beta) < 0.5 && Math.abs(gamma) < 0.5) {
            bubble.classList.add('level-active');
        } else {
            bubble.classList.remove('level-active');
        }
    }

    function calibrate() {
        // Simple zeroing logic would go here, 
        // essentially resetting current values to 0.
        alert("Sensor Zeroed");
    }

    // Auto-init for ID generation
    window.onload = () => {
        // Just warm up the display
    };
</script>
</body>
</html>
