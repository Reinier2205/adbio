<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LevelVan Master Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .waveform { display: flex; align-items: center; gap: 4px; height: 30px; }
        .bar { width: 4px; border-radius: 2px; background: #22c55e; transition: height 0.1s ease; }
        @keyframes pulse-ring { 0% { transform: scale(.33); opacity: 1; } 80%, 100% { opacity: 0; } }
        .pulse-btn::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            border: 4px solid #22c55e; border-radius: 9999px;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes radar-sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .radar-line {
            transform-origin: center;
            animation: radar-sweep 4s linear infinite;
        }
        video { object-fit: cover; width: 100%; height: 100%; background: #000; display: block; }
        .video-container { position: relative; width: 100%; height: 100%; border-radius: 1.5rem; overflow: hidden; background: #111; border: 1px solid #333; }
        .local-preview { position: absolute; bottom: 1rem; right: 1rem; width: 80px; height: 120px; border-radius: 0.75rem; border: 2px solid #22c55e; overflow: hidden; z-index: 50; background: #000; }
        .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 100; pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden select-none">
    <div class="flex flex-col h-screen max-w-md mx-auto p-4 justify-between">
        
        <!-- Header -->
        <header class="py-4 border-b border-zinc-800 flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-green-500">LEVELVAN <span class="text-xs font-normal text-zinc-500 ml-1">PRO</span></h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
                    <p id="statusText" class="text-zinc-500 text-[9px] uppercase font-bold tracking-widest">Offline</p>
                </div>
            </div>
            <div id="gpsStatus" class="text-right text-[9px] font-mono text-zinc-500 hidden">
                GPS: <span id="gpsAccuracy" class="text-green-500">INIT...</span>
            </div>
        </header>

        <!-- Room Selector Screen -->
        <div id="setup-view" class="flex-1 flex flex-col justify-center gap-3">
            <p class="text-center text-zinc-500 text-[10px] uppercase font-bold tracking-widest mb-2">Connect Devices</p>
            <button onclick="requestAllPermissionsAndJoin('LEVELVAN-A')" class="bg-zinc-900 border border-zinc-800 hover:border-green-500 p-6 rounded-2xl flex justify-between items-center active:scale-95 transition-all group">
                <span class="font-bold group-hover:text-green-400 transition-colors">HITCH ROOM ALPHA</span>
                <span class="text-[10px] bg-green-900/20 text-green-500 px-3 py-1 rounded border border-green-900/30">JOIN</span>
            </button>
            <button onclick="requestAllPermissionsAndJoin('LEVELVAN-B')" class="bg-zinc-900 border border-zinc-800 hover:border-green-500 p-6 rounded-2xl flex justify-between items-center active:scale-95 transition-all group">
                <span class="font-bold group-hover:text-green-400 transition-colors">HITCH ROOM BETA</span>
                <span class="text-[10px] bg-green-900/20 text-green-500 px-3 py-1 rounded border border-green-900/30">JOIN</span>
            </button>
            <p id="permWarning" class="text-[10px] text-zinc-500 text-center mt-2">Requires Camera, Microphone, and Location permissions.</p>
        </div>

        <!-- Main Workspace (Visible only when connected) -->
        <div id="call-view" class="hidden flex-1 flex flex-col pt-4 gap-4 overflow-hidden justify-between">
            
            <div class="flex-1 relative overflow-hidden">
                
                <!-- Screen 1: Default / Audio Status View -->
                <div id="content-audio-status" class="h-full flex flex-col items-center justify-center gap-6">
                    <div id="statusCircle" class="w-40 h-40 bg-zinc-900 rounded-full flex items-center justify-center border-2 border-zinc-800 transition-all relative">
                        <svg id="connIcon" class="text-zinc-700" width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path>
                        </svg>
                    </div>
                    <div class="text-center">
                        <h2 id="peerIdentity" class="text-xl font-black italic text-zinc-600 uppercase tracking-tighter">Searching...</h2>
                        <div id="visualizer" class="waveform opacity-0 mt-4 justify-center">
                            <div class="bar h-2 animate-bounce"></div>
                            <div class="bar h-5 animate-bounce" style="animation-delay: 0.1s"></div>
                            <div class="bar h-8 animate-bounce" style="animation-delay: 0.2s"></div>
                            <div class="bar h-4 animate-bounce" style="animation-delay: 0.3s"></div>
                        </div>
                    </div>
                </div>

                <!-- Screen 2: Live Video Stream View -->
                <div id="content-video" class="hidden h-full video-container">
                    <video id="remoteVideo" autoplay playsinline class="rounded-2xl"></video>
                    
                    <div id="playOverlay" class="play-overlay hidden" onclick="forcePlay()">
                        <div class="bg-green-600 p-4 rounded-full shadow-lg">
                            <svg width="32" height="32" fill="currentColor" viewBox="0 0 20 20"><path d="M4.5 2.691l11 6.309-11 6.309V2.691z"/></svg>
                        </div>
                    </div>
                    
                    <div id="localPreviewContainer" class="local-preview hidden">
                        <video id="localVideo" autoplay playsinline muted></video>
                    </div>
                </div>

                <!-- Screen 3: Position Tracker & Compass Radar -->
                <div id="content-tracker" class="hidden h-full flex flex-col justify-between py-2 items-center">
                    
                    <!-- Radar graphic dial -->
                    <div class="relative w-56 h-56 flex items-center justify-center">
                        <svg class="absolute inset-0 w-full h-full text-zinc-800" viewBox="0 0 200 200" fill="none">
                            <circle cx="100" cy="100" r="95" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 4"/>
                            <circle cx="100" cy="100" r="70" stroke="currentColor" stroke-width="1" />
                            <circle cx="100" cy="100" r="45" stroke="currentColor" stroke-width="1" />
                            <circle cx="100" cy="100" r="20" stroke="currentColor" stroke-width="1" />
                            <line x1="100" y1="5" x2="100" y2="195" stroke="currentColor" stroke-width="0.5"/>
                            <line x1="5" y1="100" x2="195" y2="100" stroke="currentColor" stroke-width="0.5"/>
                            <!-- Glowing sweeping line simulating standard radar -->
                            <line class="radar-line text-green-500/20" x1="100" y1="100" x2="100" y2="5" stroke="currentColor" stroke-width="2"/>
                        </svg>

                        <!-- Directional Arrow (Points to target) -->
                        <div id="compassArrow" class="w-24 h-24 flex items-center justify-center transition-transform duration-100 ease-out" style="transform: rotate(0deg);">
                            <svg class="w-16 h-16 text-green-500 drop-shadow-[0_0_8px_rgba(34,197,94,0.6)]" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2L2 22l10-6 10 6L12 2z"/>
                            </svg>
                        </div>
                    </div>

                    <!-- Telemetry dashboard -->
                    <div class="text-center bg-zinc-950/70 p-4 rounded-2xl border border-zinc-800 w-full max-w-xs backdrop-blur-md">
                        <div class="text-xs font-bold text-zinc-500 tracking-widest uppercase mb-1">Target Telemetry</div>
                        
                        <div class="flex justify-around items-center py-2">
                            <div>
                                <span class="block text-[10px] text-zinc-600 font-bold uppercase">Distance</span>
                                <span id="distVal" class="text-2xl font-black text-green-400 font-mono">--.- m</span>
                            </div>
                            <div class="w-px h-8 bg-zinc-800"></div>
                            <div>
                                <span class="block text-[10px] text-zinc-600 font-bold uppercase">Bearing</span>
                                <span id="bearVal" class="text-2xl font-black text-green-400 font-mono">--°</span>
                            </div>
                        </div>

                        <div class="text-[9px] text-zinc-600 mt-2 border-t border-zinc-900 pt-2 leading-tight">
                            Note: Indoor/poor GPS satellite connections can increase margin of accuracy error.
                        </div>
                    </div>
                </div>

            </div>

            <!-- Dashboard Navigation & Action Bar -->
            <div class="pb-8 pt-4 flex justify-around items-center bg-black/60 backdrop-blur-lg rounded-t-3xl border-t border-zinc-800 shrink-0">
                
                <!-- Level View Mode (Standard view) -->
                <div class="flex flex-col items-center gap-1">
                    <button id="viewLevelBtn" class="w-12 h-12 bg-green-950/20 border border-green-500 text-green-500 rounded-full flex items-center justify-center transition-all">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" stroke-width="2"/>
                            <circle cx="12" cy="12" r="2" fill="currentColor"/>
                        </svg>
                    </button>
                    <span class="text-[9px] text-green-500 font-bold uppercase">Standard</span>
                </div>

                <!-- Video View Mode -->
                <div class="flex flex-col items-center gap-1">
                    <button id="viewVideoBtn" class="w-12 h-12 bg-zinc-900 border border-zinc-800 text-zinc-500 rounded-full flex items-center justify-center transition-all">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                    </button>
                    <span class="text-[9px] text-zinc-500 font-bold uppercase">Hitch Cam</span>
                </div>

                <!-- Tracking View Mode -->
                <div class="flex flex-col items-center gap-1">
                    <button id="viewTrackerBtn" class="w-12 h-12 bg-zinc-900 border border-zinc-800 text-zinc-500 rounded-full flex items-center justify-center transition-all">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                            <circle cx="12" cy="11" r="2" stroke-width="2" />
                        </svg>
                    </button>
                    <span class="text-[9px] text-zinc-500 font-bold uppercase">Tracker</span>
                </div>

                <div class="h-8 w-px bg-zinc-800"></div>

                <!-- Exit/Disconnect Button -->
                <div class="flex flex-col items-center gap-1">
                    <button id="hangupBtn" class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center active:scale-90 transition-transform">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <span class="text-[9px] text-zinc-500 font-bold uppercase">Exit</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let peer = null;
        let localStream = null;
        let currentCall = null;
        let dataConnection = null;
        let wakeLock = null;
        
        let localPos = { lat: null, lon: null, accuracy: null };
        let remotePos = { lat: null, lon: null };
        let localHeading = 0; // Degrees relative to true North

        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const remoteVideo = document.getElementById('remoteVideo');
        const localVideo = document.getElementById('localVideo');
        const overlay = document.getElementById('playOverlay');

        // Geolocation Tracker Options
        const geoOptions = {
            enableHighAccuracy: true,
            timeout: 5000,
            maximumAge: 0
        };

        // --- Permissions Request Pipeline ---
        async function requestAllPermissionsAndJoin(roomName) {
            document.getElementById('permWarning').innerText = "Acquiring Permissions & GPS Satellites...";
            try {
                // 1. Mic and Video (Hitch Camera)
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 20 } } 
                });
                localVideo.srcObject = localStream;
                
                // 2. Location (GPS tracking)
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition(updateLocalPos, handleGeoError, geoOptions);
                } else {
                    alert("GPS not supported on this browser.");
                }

                // 3. Orientation (Compass Compass direction)
                setupCompass();

                // 4. Awake WakeLock
                requestWakeLock();

                // Hide setup UI, show Call Workspace
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('call-view').classList.remove('hidden');
                
                initHandshake(roomName);
            } catch (e) {
                console.error(e);
                alert("Please grant all required Camera, Mic, and Location permissions.");
                document.getElementById('permWarning').innerText = "Permission acquisition failed.";
            }
        }

        // --- Wake Lock (Netflix Mode) ---
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Screen Wake Lock acquired');
                } catch (err) {
                    console.warn('Wake Lock acquisition failed:', err);
                }
            }
        }

        // --- Geolocation Position Sync ---
        function updateLocalPos(position) {
            localPos.lat = position.coords.latitude;
            localPos.lon = position.coords.longitude;
            localPos.accuracy = position.coords.accuracy;

            document.getElementById('gpsStatus').classList.remove('hidden');
            document.getElementById('gpsAccuracy').innerText = `±${Math.round(localPos.accuracy)}m`;

            // Broadcast coordinates to peer instantly
            broadcastCoordinates();
            calculateRelativePosition();
        }

        function handleGeoError(err) {
            console.error("GPS Error: ", err.message);
        }

        function broadcastCoordinates() {
            if (dataConnection && dataConnection.open && localPos.lat !== null) {
                dataConnection.send({
                    type: 'COORDS',
                    lat: localPos.lat,
                    lon: localPos.lon
                });
            }
        }

        // --- Compass Orientation Logic (Factual Verification) ---
        function setupCompass() {
            // iOS Safari Compass Event check
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                        }
                    }).catch(console.error);
            } else {
                // Android Chrome absolute compass check
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
        }

        function handleOrientation(event) {
            let heading = 0;
            if (event.webkitCompassHeading) {
                // iOS directly provides a verified compass heading (0 = North)
                heading = event.webkitCompassHeading;
            } else if (event.absolute && event.alpha !== null) {
                // Android standardizes alpha around the magnetic north vector on absolute orientation events
                heading = 360 - event.alpha;
            } else {
                return; // Fallback gracefully if hardware is not present
            }
            localHeading = heading;
            calculateRelativePosition();
        }

        // --- Distance & Bearing calculation (Factual Math) ---
        function calculateRelativePosition() {
            if (localPos.lat === null || remotePos.lat === null) return;

            // 1. Distance Calculation (Haversine formula)
            const R = 6371000; // Earth's radius in meters
            const dLat = (remotePos.lat - localPos.lat) * Math.PI / 180;
            const dLon = (remotePos.lon - localPos.lon) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(localPos.lat * Math.PI / 180) * Math.cos(remotePos.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = R * c; // in meters

            // Update UI meters/feet dynamically
            const distValEl = document.getElementById('distVal');
            if (distance < 100) {
                distValEl.innerText = `${distance.toFixed(1)} m`;
            } else {
                distValEl.innerText = `${Math.round(distance)} m`;
            }

            // 2. True Bearing Calculation
            const dL = (remotePos.lon - localPos.lon) * Math.PI / 180;
            const lat1 = localPos.lat * Math.PI / 180;
            const lat2 = remotePos.lat * Math.PI / 180;
            const y = Math.sin(dL) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dL);
            let bearing = Math.atan2(y, x) * 180 / Math.PI;
            bearing = (bearing + 360) % 360; // Normalize [0 - 360]

            document.getElementById('bearVal').innerText = `${Math.round(bearing)}°`;

            // 3. Direction Arrow Rotation
            // Relative Angle = True Bearing to target - Device's Heading
            const relativeHeading = bearing - localHeading;
            document.getElementById('compassArrow').style.transform = `rotate(${relativeHeading}deg)`;
        }

        // --- P2P Signaling Orchestrator ---
        function initHandshake(roomName) {
            const idA = `${roomName}-A`;
            const idB = `${roomName}-B`;

            const config = {
                debug: 1,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            };

            const tryRegister = (targetId, partnerId) => {
                const p = new Peer(targetId, config);
                
                p.on('open', () => {
                    peer = p;
                    updateStatus("SEARCHING PEER", "bg-yellow-500");
                    
                    // Listen for Media Call
                    peer.on('call', incoming => {
                        incoming.answer(localStream);
                        handleCallStream(incoming);
                    });

                    // Listen for Data Connection (GPS Exchange)
                    peer.on('connection', conn => {
                        handleDataConnection(conn);
                    });

                    // Attempt connection to peer variations
                    setTimeout(() => {
                        const call = peer.call(partnerId, localStream);
                        if (call) handleCallStream(call);

                        const conn = peer.connect(partnerId);
                        if (conn) handleDataConnection(conn);
                    }, 1000);
                });

                p.on('error', (err) => {
                    if (err.type === 'unavailable-id') tryRegister(partnerId, targetId);
                });
            };
            tryRegister(idA, idB);
        }

        function handleCallStream(call) {
            currentCall = call;
            call.on('stream', (stream) => {
                remoteVideo.srcObject = stream;
                remoteVideo.play().catch(() => overlay.classList.remove('hidden'));
                updateStatus("CONNECTED", "bg-green-500");
                document.getElementById('peerIdentity').innerText = "DEVICE PRO LINKED";
                document.getElementById('peerIdentity').classList.add('text-green-500');
            });
            call.on('close', () => window.location.reload());
        }

        function handleDataConnection(conn) {
            dataConnection = conn;
            conn.on('open', () => {
                // Push our current coordinates once the P2P pipe is officially open
                broadcastCoordinates();
            });
            conn.on('data', data => {
                if (data.type === 'COORDS') {
                    remotePos.lat = data.lat;
                    remotePos.lon = data.lon;
                    calculateRelativePosition();
                }
            });
        }

        function forcePlay() {
            remoteVideo.play();
            overlay.classList.add('hidden');
        }

        function updateStatus(txt, cls) {
            statusText.innerText = txt;
            statusDot.className = `w-2.5 h-2.5 rounded-full ${cls}`;
        }

        // --- Screen & Panel Toggle Management ---
        const btnLevel = document.getElementById('viewLevelBtn');
        const btnVideo = document.getElementById('viewVideoBtn');
        const btnTracker = document.getElementById('viewTrackerBtn');

        const panelLevel = document.getElementById('content-audio-status');
        const panelVideo = document.getElementById('content-video');
        const panelTracker = document.getElementById('content-tracker');
        const preview = document.getElementById('localPreviewContainer');

        function resetTabs() {
            [btnLevel, btnVideo, btnTracker].forEach(btn => {
                btn.className = "w-12 h-12 bg-zinc-900 border border-zinc-800 text-zinc-500 rounded-full flex items-center justify-center transition-all";
            });
            [panelLevel, panelVideo, panelTracker, preview].forEach(panel => panel.classList.add('hidden'));
        }

        btnLevel.onclick = () => {
            resetTabs();
            btnLevel.className = "w-12 h-12 bg-green-950/20 border border-green-500 text-green-500 rounded-full flex items-center justify-center transition-all";
            panelLevel.classList.remove('hidden');
        };

        btnVideo.onclick = () => {
            resetTabs();
            btnVideo.className = "w-12 h-12 bg-green-950/20 border border-green-500 text-green-500 rounded-full flex items-center justify-center transition-all";
            panelVideo.classList.remove('hidden');
            preview.classList.remove('hidden');
        };

        btnTracker.onclick = () => {
            resetTabs();
            btnTracker.className = "w-12 h-12 bg-green-950/20 border border-green-500 text-green-500 rounded-full flex items-center justify-center transition-all";
            panelTracker.classList.remove('hidden');
        };

        document.getElementById('hangupBtn').onclick = () => {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (wakeLock) wakeLock.release();
            window.location.reload();
        };
    </script>
</body>
</html>
