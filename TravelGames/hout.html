<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wood Price Comparer V3</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 10px;
    background: #f4f4f4;
}

.container {
    max-width: 980px;
    margin: auto;
}

.card {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 12px;
}

h1, h2 {
    margin: 0 0 10px 0;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 8px;
    box-sizing: border-box;
    font-size: 14px;
}

button {
    cursor: pointer;
}

.grid {
    display: grid;
    gap: 8px;
}

@media(min-width:800px){
    .grid {
        grid-template-columns: repeat(4,1fr);
    }
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th, td {
    padding: 8px;
    border: 1px solid #ddd;
    text-align: center;
}

th {
    background: #efefef;
}

.cheapest {
    background: #dff0d8;
    font-weight: bold;
}

.btn-danger {
    background: #d9534f;
    color: white;
    border: none;
    padding: 6px;
}

.btn-edit {
    background: #0275d8;
    color: white;
    border: none;
    padding: 6px;
}

.small {
    font-size: 12px;
    color: #666;
}

.summary {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 8px;
    font-size: 13px;
}

@media(min-width:800px){
    .summary {
        grid-template-columns: repeat(4,1fr);
    }
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>Wood Price Comparer</h1>

<div class="summary" id="dashboard"></div>
</div>

<!-- SELLERS -->
<div class="card">
<h2>Sellers</h2>
<input id="newSeller" placeholder="Add seller">
<button onclick="addSeller()">Add Seller</button>

<select id="filterSeller" onchange="render()"></select>
</div>

<!-- WOOD TYPES -->
<div class="card">
<h2>Wood Types</h2>
<input id="newWood" placeholder="Add wood type">
<button onclick="addWood()">Add Wood Type</button>

<select id="filterWood" onchange="render()"></select>
</div>

<!-- INPUT -->
<div class="card">
<h2>Add / Edit Entry</h2>

<select id="seller"></select>
<select id="wood"></select>

<label>Qty</label>
<input type="number" id="qty" value="1" min="1">

<label>Weight per bag (kg)</label>
<input type="number" id="weight">

<label>Price (R)</label>
<input type="number" id="price">

<input id="notes" placeholder="Notes">

<button onclick="save()">Save Entry</button>
</div>

<!-- TABLE -->
<div class="card">
<input id="search" placeholder="Search seller or wood..." oninput="render()">

<table>
<thead>
<tr>
<th>Seller</th>
<th>Wood</th>
<th>Qty</th>
<th>Weight</th>
<th>Total</th>
<th>Price</th>
<th>R/kg</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

let sellers = JSON.parse(localStorage.getItem('sellers')) || ['Bossies'];
let woods = JSON.parse(localStorage.getItem('woods')) || ['Kameeldoring'];
let entries = JSON.parse(localStorage.getItem('entries')) || [];

let editId = null;

function saveStore(){
    localStorage.setItem('sellers', JSON.stringify(sellers));
    localStorage.setItem('woods', JSON.stringify(woods));
    localStorage.setItem('entries', JSON.stringify(entries));
}

/* SELLERS */
function addSeller(){
    let v = document.getElementById('newSeller').value.trim();
    if(!v || sellers.includes(v)) return;
    sellers.push(v);
    saveStore();
    load();
}

/* WOODS */
function addWood(){
    let v = document.getElementById('newWood').value.trim();
    if(!v || woods.includes(v)) return;
    woods.push(v);
    saveStore();
    load();
}

/* LOAD DROPDOWNS */
function load(){

    let s = document.getElementById('seller');
    let fS = document.getElementById('filterSeller');

    let w = document.getElementById('wood');
    let fW = document.getElementById('filterWood');

    s.innerHTML = '';
    fS.innerHTML = '<option value="">All Sellers</option>';

    w.innerHTML = '';
    fW.innerHTML = '<option value="">All Wood</option>';

    sellers.sort().forEach(x=>{
        s.add(new Option(x,x));
        fS.add(new Option(x,x));
    });

    woods.sort().forEach(x=>{
        w.add(new Option(x,x));
        fW.add(new Option(x,x));
    });
}

/* SAVE ENTRY */
function save(){

    let seller = sellerEl().value;
    let wood = woodEl().value;
    let qty = +document.getElementById('qty').value;
    let weight = +document.getElementById('weight').value;
    let price = +document.getElementById('price').value;
    let notes = document.getElementById('notes').value;
    let date = new Date().toISOString().split('T')[0];

    if(!seller || !wood || !qty || !weight || !price) return;

    let entry = {
        id: editId || Date.now(),
        seller,
        wood,
        qty,
        weight,
        price,
        notes,
        date
    };

    if(editId){
        entries = entries.map(e=>e.id===editId?entry:e);
        editId = null;
    } else {
        entries.push(entry);
    }

    saveStore();
    clear();
    render();
}

function clear(){
    document.getElementById('qty').value = 1;
    document.getElementById('weight').value = '';
    document.getElementById('price').value = '';
    document.getElementById('notes').value = '';
}

/* HELPERS */
function sellerEl(){ return document.getElementById('seller'); }
function woodEl(){ return document.getElementById('wood'); }

/* DELETE */
function del(id){
    entries = entries.filter(e=>e.id!==id);
    saveStore();
    render();
}

/* EDIT */
function edit(id){
    let e = entries.find(x=>x.id===id);
    if(!e) return;

    editId = id;

    sellerEl().value = e.seller;
    woodEl().value = e.wood;
    document.getElementById('qty').value = e.qty;
    document.getElementById('weight').value = e.weight;
    document.getElementById('price').value = e.price;
    document.getElementById('notes').value = e.notes;
}

/* RENDER */
function render(){

    let search = document.getElementById('search').value.toLowerCase();
    let fSeller = document.getElementById('filterSeller').value;
    let fWood = document.getElementById('filterWood').value;

    let data = entries.map(e=>({
        ...e,
        total: e.qty * e.weight,
        cost: e.price / (e.qty * e.weight)
    }));

    if(fSeller) data = data.filter(d=>d.seller===fSeller);
    if(fWood) data = data.filter(d=>d.wood===fWood);

    if(search){
        data = data.filter(d =>
            d.seller.toLowerCase().includes(search) ||
            d.wood.toLowerCase().includes(search)
        );
    }

    data.sort((a,b)=>a.cost-b.cost);

    let cheapest = data[0]?.cost;

    let t = document.getElementById('table');
    t.innerHTML = '';

    data.forEach(d=>{

        let tr = document.createElement('tr');

        if(d.cost===cheapest) tr.classList.add('cheapest');

        tr.innerHTML = `
        <td>${d.seller}</td>
        <td>${d.wood}</td>
        <td>${d.qty}</td>
        <td>${d.weight}</td>
        <td>${(d.qty*d.weight).toFixed(1)}</td>
        <td>R${d.price.toFixed(2)}</td>
        <td>R${d.cost.toFixed(2)}</td>
        <td>
            <button class="btn-edit" onclick="edit(${d.id})">E</button>
            <button class="btn-danger" onclick="del(${d.id})">X</button>
        </td>
        `;

        t.appendChild(tr);
    });

    dashboard();
}

/* DASHBOARD */
function dashboard(){

    if(!entries.length) return;

    let calc = entries.map(e=>({
        seller:e.seller,
        cost:e.price/(e.qty*e.weight)
    })).sort((a,b)=>a.cost-b.cost);

    let cheapest = calc[0];

    document.getElementById('dashboard').innerHTML = `
    <div><b>Cheapest</b><br>${cheapest.seller}</div>
    <div><b>R/kg</b><br>R${cheapest.cost.toFixed(2)}</div>
    <div><b>Entries</b><br>${entries.length}</div>
    <div><b>Sellers</b><br>${[...new Set(entries.map(e=>e.seller))].length}</div>
    `;
}

/* INIT */
load();
render();

</script>

</body>
</html>
