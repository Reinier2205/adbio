<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BraaiTyd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; }
        .card { background: #2d2d2d; border-radius: 1rem; padding: 1.5rem; }
        .btn { padding: 1rem; border-radius: 0.5rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="mb-6 text-center">
        <h1 class="text-3xl font-black text-orange-500">BraaiTyd</h1>
        <p class="text-zinc-400">Master your fire.</p>
    </header>

    <div id="setup" class="space-y-4">
        <select id="meatSelect" class="w-full p-4 bg-zinc-800 rounded-lg text-white" onchange="updateMeat()">
            <option value="rump">Beef: Rump</option>
            <option value="fillet">Beef: Fillet</option>
            <option value="ribeye">Beef: Ribeye</option>
            <option value="lambChop">Lamb: Loin Chops</option>
            <option value="porkChop">Pork: Loin Chops</option>
            <option value="wors">Boerewors</option>
            <option value="chicken">Chicken: Pieces</option>
            <option value="burger">Beef: Burger Patties</option>
        </select>
        
        <div id="wellnessSection" class="hidden">
            <label class="block text-sm mb-2">Target Wellness</label>
            <select id="wellness" class="w-full p-4 bg-zinc-800 rounded-lg">
                <option value="rare">Rare (52°C)</option>
                <option value="medRare">Medium-Rare (55°C)</option>
                <option value="medium">Medium (60°C)</option>
                <option value="wellDone">Well Done (72°C+)</option>
            </select>
        </div>

        <div id="controls" class="card">
            <h2 id="stepName" class="text-xl font-bold mb-4">Braai Step</h2>
            <div class="flex items-center gap-4 mb-6">
                <button onclick="changeTime(-60)" class="btn bg-zinc-700">-1m</button>
                <span id="timeDisplay" class="text-6xl font-mono font-bold flex-1 text-center">00:00</span>
                <button onclick="changeTime(60)" class="btn bg-zinc-700">+1m</button>
            </div>
            <button id="mainBtn" onclick="toggleTimer()" class="w-full btn bg-orange-600">Start Timer</button>
        </div>
    </div>

    <script>
        const meatData = {
            rump: { name: "Rump Steak", steps: [{n:"Braai", t:300}, {n:"Turn", t:300}, {n:"Rest", t:300}], hasWellness: true },
            wors: { name: "Boerewors", steps: [{n:"Braai", t:300}, {n:"Turn", t:300}, {n:"Finish", t:240}], hasWellness: false }
            // Add more as needed
        };

        let currentStepIndex = 0;
        let timeLeft = 300;
        let timer = null;
        let isRunning = false;

        function updateMeat() {
            const m = meatData[document.getElementById('meatSelect').value];
            document.getElementById('wellnessSection').classList.toggle('hidden', !m.hasWellness);
            timeLeft = m.steps[0].t;
            render();
        }

        function render() {
            const m = meatData[document.getElementById('meatSelect').value];
            document.getElementById('stepName').innerText = m.steps[currentStepIndex].n;
            document.getElementById('timeDisplay').innerText = formatTime(timeLeft);
        }

        function formatTime(s) {
            const m = Math.floor(s/60);
            const sec = s % 60;
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function changeTime(amt) {
            timeLeft = Math.max(0, timeLeft + amt);
            render();
        }

        function toggleTimer() {
            if(isRunning) {
                clearInterval(timer);
                isRunning = false;
                document.getElementById('mainBtn').innerText = "Start Timer";
            } else {
                isRunning = true;
                document.getElementById('mainBtn').innerText = "Stop Timer";
                timer = setInterval(() => {
                    timeLeft--;
                    render();
                    if(timeLeft <= 0) {
                        clearInterval(timer);
                        playSound();
                        alert("Time is up!"); // Replace with custom UI if preferred
                    }
                }, 1000);
            }
        }

        function playSound() {
            const utterance = new SpeechSynthesisUtterance("Time is up. Step complete.");
            window.speechSynthesis.speak(utterance);
        }

        updateMeat();
    </script>
</body>
</html>
