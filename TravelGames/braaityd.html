<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BraaiTyd Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .stage-active { border: 2px solid #f97316; box-shadow: 0 0 15px rgba(249, 115, 22, 0.3); }
    </style>
</head>
<body class="p-4 max-w-md mx-auto h-screen flex flex-col">

    <!-- Volume Header -->
    <div class="bg-indigo-900/50 border border-indigo-500/30 p-2 rounded-lg text-center mb-4">
        <p class="text-[9px] font-bold tracking-widest text-indigo-200 uppercase">Ensure volume is up for voice guidance</p>
    </div>

    <!-- Progress Indicator -->
    <div id="stepProgress" class="flex gap-2 justify-center mb-8">
        <!-- Steps generated via JS -->
    </div>

    <div class="flex-1 flex flex-col items-center justify-center">
        <h2 id="stepName" class="text-2xl font-black uppercase tracking-widest text-orange-500 mb-6">Braai</h2>
        
        <div class="relative w-64 h-64 flex items-center justify-center mb-8">
            <div class="absolute inset-0 border-8 border-zinc-800 rounded-full"></div>
            <div id="ring" class="absolute inset-0 border-8 border-orange-500 rounded-full transition-all duration-1000"></div>
            <span id="timeDisplay" class="text-6xl font-black font-mono">00:00</span>
        </div>

        <div class="flex w-full gap-4 mb-8">
            <button onclick="changeTime(-30)" class="flex-1 py-4 bg-zinc-800 rounded-2xl font-bold text-xl active:bg-zinc-700">-30s</button>
            <button onclick="changeTime(30)" class="flex-1 py-4 bg-zinc-800 rounded-2xl font-bold text-xl active:bg-zinc-700">+30s</button>
        </div>

        <button id="mainBtn" onclick="toggleTimer()" class="w-full py-6 bg-orange-600 rounded-2xl font-black text-2xl uppercase tracking-widest shadow-lg active:scale-95 transition-all">Start</button>
    </div>

    <script>
        const stages = ["Braai", "Turn", "Braai", "Rest"];
        let currentStep = 0;
        let timeLeft = 300; // 5 min default
        let isRunning = false;
        let timer = null;
        let wakeLock = null;

        function renderProgress() {
            const container = document.getElementById('stepProgress');
            container.innerHTML = stages.map((s, i) => `
                <div class="w-3 h-3 rounded-full ${i === currentStep ? 'bg-orange-500' : i < currentStep ? 'bg-orange-900' : 'bg-zinc-700'}"></div>
            `).join('');
            document.getElementById('stepName').innerText = stages[currentStep];
        }

        async function toggleTimer() {
            if (isRunning) {
                clearInterval(timer);
                isRunning = false;
                document.getElementById('mainBtn').innerText = "Start";
            } else {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
                isRunning = true;
                document.getElementById('mainBtn').innerText = "Pause";
                timer = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        advanceStage();
                    }
                    updateDisplay();
                }, 1000);
            }
        }

        function advanceStage() {
            clearInterval(timer);
            isRunning = false;
            currentStep++;
            if (currentStep < stages.length) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(`Step complete. Next step: ${stages[currentStep]}`));
                timeLeft = 300; // Reset for next stage
                renderProgress();
                updateDisplay();
                document.getElementById('mainBtn').innerText = "Start Next Step";
            } else {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Braai complete. Enjoy your meal!"));
                currentStep = 0;
                renderProgress();
                document.getElementById('mainBtn').innerText = "Restart";
            }
        }

        function updateDisplay() {
            document.getElementById('timeDisplay').innerText = formatTime(timeLeft);
        }

        function formatTime(s) {
            return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
        }

        function changeTime(amt) {
            timeLeft = Math.max(0, timeLeft + amt);
            updateDisplay();
        }

        renderProgress();
        updateDisplay();
    </script>
</body>
</html>
