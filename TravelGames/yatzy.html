<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disney Yatzy Duel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --felt: #073b1c;
            --gold: #d4af37;
            --gold-light: #ffd700;
            --glass: rgba(0, 0, 0, 0.98);
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #041a0b;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .cinzel { font-family: 'Cinzel', serif; }

        .casino-container {
            background: var(--felt);
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 80%);
            border: 8px solid #2c1a12;
            box-shadow: 0 0 0 2px var(--gold), 0 20px 50px rgba(0,0,0,0.8);
            width: 100vw;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Scoreboard Grid */
        .score-grid {
            display: grid;
            grid-template-columns: 85px repeat(var(--player-count, 2), 1fr);
            gap: 1px;
            background: rgba(212, 175, 55, 0.2);
            overflow-y: auto;
            flex: 1;
        }

        /* Sticky Headers */
        .grid-header {
            background: #111;
            position: sticky;
            top: 0;
            z-index: 20;
            padding: 10px 2px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85px;
        }

        .category-cell {
            background: #0a2e18;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 4px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--gold);
            letter-spacing: 0.02em;
            text-align: center;
        }

        .dice-svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        .score-cell {
            background: #051f0f;
            min-height: 58px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-size: 24px;
            transition: all 0.2s;
            position: relative;
        }

        .score-cell.filled {
            color: var(--gold-light);
            background: #020c06;
            font-weight: bold;
        }

        .score-cell:active {
            background: var(--gold);
            color: black;
        }

        .progress-circle {
            width: 46px;
            height: 46px;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            background: #000;
        }

        /* Numpad Overlay */
        .numpad-overlay {
            position: absolute;
            inset: 0;
            background: var(--glass);
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .num-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 320px;
        }

        .num-btn {
            background: #1a1a1a;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            padding: 22px;
            font-size: 32px;
            border-radius: 12px;
            font-family: 'Cinzel', serif;
            line-height: 1;
        }
        .num-btn:active { background: var(--gold); color: black; }
        .num-btn.zero { grid-column: span 2; }
        .num-btn.clear { background: #331111; color: #ef4444; font-size: 16px; display: flex; align-items: center; justify-content: center; font-family: 'Lato'; font-weight: 900; }

        .setup-screen {
            position: absolute;
            inset: 0;
            background: #041a0b;
            z-index: 400;
            display: flex;
            flex-direction: column;
        }
        
        .setup-footer {
            background: #000;
            padding: 20px;
            border-top: 2px solid var(--gold);
        }

        .btn-main {
            background: #b91c1c;
            color: white;
            font-family: 'Cinzel', serif;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #7f1d1d;
        }
    </style>
</head>
<body>

<div class="casino-container">
    <!-- Numpad -->
    <div id="numpad" class="numpad-overlay">
        <div class="flex items-center gap-3 mb-2">
            <span id="np-icon" class="text-2xl"></span>
            <span id="np-player-name" class="cinzel text-gold text-lg"></span>
        </div>
        <div class="text-white/60 uppercase text-[10px] tracking-widest mb-1" id="np-title">Category</div>
        <div id="np-display" class="text-6xl text-gold-light font-black mb-6 h-16 flex items-center justify-center">0</div>
        
        <div class="num-grid">
            <button class="num-btn" onclick="pressNum(1)">1</button>
            <button class="num-btn" onclick="pressNum(2)">2</button>
            <button class="num-btn" onclick="pressNum(3)">3</button>
            <button class="num-btn" onclick="pressNum(4)">4</button>
            <button class="num-btn" onclick="pressNum(5)">5</button>
            <button class="num-btn" onclick="pressNum(6)">6</button>
            <button class="num-btn" onclick="pressNum(7)">7</button>
            <button class="num-btn" onclick="pressNum(8)">8</button>
            <button class="num-btn" onclick="pressNum(9)">9</button>
            <button class="num-btn clear" onclick="clearNum()">CLEAR</button>
            <button class="num-btn zero" onclick="pressNum(0)">0</button>
        </div>
        
        <div class="flex w-full max-w-[320px] gap-4 mt-8">
            <button onclick="closeNumpad()" class="flex-1 py-4 bg-white/10 rounded-xl text-white font-bold uppercase text-xs">Cancel</button>
            <button onclick="confirmScore()" class="flex-1 py-4 bg-green-700 rounded-xl text-white font-bold uppercase text-xs">Save Score</button>
        </div>
    </div>

    <!-- Setup Screen -->
    <div id="setup-screen" class="setup-screen">
        <div class="flex-1 p-6 overflow-y-auto">
            <h2 class="cinzel text-3xl text-gold text-center mt-6 mb-2">Yatzy Duel</h2>
            <p class="text-gold/40 text-center text-[10px] uppercase tracking-widest mb-8">Multiplayer Scorecard</p>
            
            <div id="player-setup-list" class="space-y-3"></div>
            
            <div id="add-prompt" class="mt-6 space-y-3">
                <button onclick="togglePlayer(2)" id="btn-p3" class="w-full py-4 border border-dashed border-gold/20 rounded-xl text-gold/40 text-xs font-bold uppercase">
                    + Add Player 3 (Simba)
                </button>
                <button onclick="togglePlayer(3)" id="btn-p4" class="w-full py-4 border border-dashed border-gold/20 rounded-xl text-gold/40 text-xs font-bold uppercase">
                    + Add Player 4 (Stitch)
                </button>
            </div>
        </div>
        
        <div class="setup-footer">
            <button onclick="startGame()" class="btn-main">Start Game</button>
        </div>
    </div>

    <!-- Header -->
    <div class="p-3 bg-black flex justify-between items-center border-b border-gold/40">
        <div class="cinzel text-gold text-xs tracking-widest">Disney Duel</div>
        <button onclick="location.reload()" class="bg-white/10 text-[10px] px-3 py-1 rounded font-bold uppercase">Reset</button>
    </div>

    <!-- Board -->
    <div id="game-table" class="score-grid"></div>

    <!-- Footer -->
    <div class="bg-black px-4 py-3 border-t border-gold flex justify-between items-center text-[10px]">
        <div class="text-gold/60 uppercase">Tap score cell to edit</div>
        <div class="text-green-500 font-black">BONUS: 63 pts -> +35</div>
    </div>
</div>

<script>
    const ALL_DEFAULTS = [
        { name: 'Mickey', icon: '🐭', active: true },
        { name: 'Elsa', icon: '❄️', active: true },
        { name: 'Simba', icon: '🦁', active: false },
        { name: 'Stitch', icon: '👽', active: false }
    ];

    const DICE_SVGS = {
        1: '<svg class="dice-svg" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="15" fill="white"/><circle cx="50" cy="50" r="8" fill="black"/></svg>',
        2: '<svg class="dice-svg" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="15" fill="white"/><circle cx="30" cy="30" r="8" fill="black"/><circle cx="70" cy="70" r="8" fill="black"/></svg>',
        3: '<svg class="dice-svg" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="15" fill="white"/><circle cx="30" cy="30" r="8" fill="black"/><circle cx="50" cy="50" r="8" fill="black"/><circle cx="70" cy="70" r="8" fill="black"/></svg>',
        4: '<svg class="dice-svg" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="15" fill="white"/><circle cx="30" cy="30" r="8" fill="black"/><circle cx="70" cy="30" r="8" fill="black"/><circle cx="30" cy="70" r="8" fill="black"/><circle cx="70" cy="70" r="8" fill="black"/></svg>',
        5: '<svg class="dice-svg" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="15" fill="white"/><circle cx="30" cy="30" r="8" fill="black"/><circle cx="70" cy="30" r="8" fill="black"/><circle cx="50" cy="50" r="8" fill="black"/><circle cx="30" cy="70" r="8" fill="black"/><circle cx="70" cy="70" r="8" fill="black"/></svg>',
        6: '<svg class="dice-svg" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="15" fill="white"/><circle cx="30" cy="25" r="8" fill="black"/><circle cx="70" cy="25" r="8" fill="black"/><circle cx="30" cy="50" r="8" fill="black"/><circle cx="70" cy="50" r="8" fill="black"/><circle cx="30" cy="75" r="8" fill="black"/><circle cx="70" cy="75" r="8" fill="black"/></svg>'
    };

    const CATS = [
        { id: '1', name: 'Ones', type: 'upper', dice: 1 },
        { id: '2', name: 'Twos', type: 'upper', dice: 2 },
        { id: '3', name: 'Threes', type: 'upper', dice: 3 },
        { id: '4', name: 'Fours', type: 'upper', dice: 4 },
        { id: '5', name: 'Fives', type: 'upper', dice: 5 },
        { id: '6', name: 'Sixes', type: 'upper', dice: 6 },
        { id: '3x', name: '3 Kind', type: 'lower' },
        { id: '4x', name: '4 Kind', type: 'lower' },
        { id: 'fh', name: 'Full H.', type: 'lower' },
        { id: 'ss', name: 'Sm Str.', type: 'lower' },
        { id: 'ls', name: 'Lg Str.', type: 'lower' },
        { id: 'yz', name: 'Yatzy', type: 'lower' },
        { id: 'ch', name: 'Chance', type: 'lower' }
    ];

    let players = [];
    let activeSelection = null;
    let currentInputStr = "";

    function renderSetup() {
        const list = document.getElementById('player-setup-list');
        list.innerHTML = ALL_DEFAULTS.map((p, i) => {
            if (!p.active) return '';
            return `
                <div class="bg-black/40 p-3 rounded-xl border border-gold/40 flex items-center gap-4">
                    <div class="text-2xl">${p.icon}</div>
                    <div class="flex-1">
                        <input type="text" value="${p.name}" oninput="ALL_DEFAULTS[${i}].name=this.value" 
                               class="bg-transparent border-b border-gold/20 w-full outline-none font-bold text-gold py-1">
                    </div>
                    ${i > 1 ? `<button onclick="togglePlayer(${i})" class="text-red-500/50 p-2 text-xs">✕</button>` : ''}
                </div>
            `;
        }).join('');

        document.getElementById('btn-p3').style.display = ALL_DEFAULTS[2].active ? 'none' : 'block';
        document.getElementById('btn-p4').style.display = (ALL_DEFAULTS[3].active || !ALL_DEFAULTS[2].active) ? 'none' : 'block';
    }

    function togglePlayer(idx) {
        ALL_DEFAULTS[idx].active = !ALL_DEFAULTS[idx].active;
        if (idx === 2 && !ALL_DEFAULTS[idx].active) ALL_DEFAULTS[3].active = false;
        renderSetup();
    }

    function startGame() {
        players = ALL_DEFAULTS.filter(p => p.active).map(p => ({
            ...p, scores: {}, total: 0, upperSum: 0, bonus: 0
        }));
        document.getElementById('setup-screen').style.display = 'none';
        renderBoard();
    }

    function renderBoard() {
        const table = document.getElementById('game-table');
        table.style.setProperty('--player-count', players.length);
        
        // Header Row (Sticky)
        let html = `<div class="grid-header bg-black/50"></div>`;
        players.forEach((p) => {
            html += `
                <div class="grid-header">
                    <div class="text-2xl leading-none mb-1">${p.icon}</div>
                    <div class="text-[9px] text-white/60 uppercase font-black truncate max-w-[60px] mb-1">${p.name}</div>
                    <div class="text-[18px] text-gold-light font-black cinzel">${p.total}</div>
                </div>
            `;
        });

        // Category Rows
        CATS.forEach(cat => {
            html += `
                <div class="category-cell">
                    ${cat.dice ? DICE_SVGS[cat.dice] : ''}
                    <span>${cat.name}</span>
                </div>
            `;
            players.forEach((p, pIdx) => {
                const score = p.scores[cat.id];
                html += `
                    <div class="score-cell ${score !== undefined ? 'filled' : ''}" 
                         onclick="openNumpad(${pIdx}, '${cat.id}')">
                        ${score !== undefined ? score : ''}
                    </div>
                `;
            });
        });

        // Bonus Row
        html += `<div class="category-cell"><span class="mt-2">UPPER BONUS</span></div>`;
        players.forEach(p => {
            const isDone = p.upperSum >= 63;
            html += `
                <div class="score-cell">
                    <div class="progress-circle ${isDone ? 'border-green-500 text-green-500' : 'border-white/10 text-white/30'}">
                        <div class="text-[14px] leading-tight">${p.upperSum}</div>
                        <div class="text-[7px] opacity-40">/63</div>
                    </div>
                </div>
            `;
        });

        table.innerHTML = html;
    }

    function openNumpad(pIdx, catId) {
        activeSelection = { pIdx, catId };
        const p = players[pIdx];
        const existingScore = p.scores[catId];
        
        currentInputStr = existingScore !== undefined ? existingScore.toString() : "";
        
        document.getElementById('np-icon').innerText = p.icon;
        document.getElementById('np-player-name').innerText = p.name;
        document.getElementById('np-title').innerText = CATS.find(c => c.id === catId).name;
        document.getElementById('np-display').innerText = currentInputStr || "0";
        document.getElementById('numpad').style.display = 'flex';
    }

    function closeNumpad() {
        document.getElementById('numpad').style.display = 'none';
    }

    function pressNum(n) {
        if (currentInputStr.length >= 2) return;
        currentInputStr += n;
        document.getElementById('np-display').innerText = currentInputStr;
    }

    function clearNum() {
        currentInputStr = "";
        document.getElementById('np-display').innerText = "0";
    }

    function confirmScore() {
        if (!activeSelection) return;
        const score = currentInputStr === "" ? undefined : parseInt(currentInputStr);
        const { pIdx, catId } = activeSelection;
        
        if (score === undefined) {
            delete players[pIdx].scores[catId];
        } else {
            players[pIdx].scores[catId] = score;
        }
        
        // Recalculate totals
        players.forEach(p => {
            let upper = 0; let lower = 0;
            CATS.forEach(c => {
                const val = p.scores[c.id] || 0;
                if (c.type === 'upper') upper += val; else lower += val;
            });
            p.upperSum = upper;
            p.bonus = upper >= 63 ? 35 : 0;
            p.total = upper + p.bonus + lower;
        });

        closeNumpad();
        renderBoard();
    }

    renderSetup();
</script>
</body>
</html>
