<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disney Yatzy Scorecard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --felt: #073b1c;
            --gold: #d4af37;
            --gold-light: #ffd700;
            --glass: rgba(0, 0, 0, 0.9);
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #041a0b;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .cinzel { font-family: 'Cinzel', serif; }

        .casino-container {
            background: var(--felt);
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 80%);
            border: 8px solid #2c1a12;
            box-shadow: 0 0 0 2px var(--gold), 0 20px 50px rgba(0,0,0,0.8);
            width: 100vw;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .setup-screen {
            position: absolute;
            inset: 0;
            background: var(--glass);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .setup-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: 100px repeat(var(--player-count, 1), 1fr);
            gap: 1px;
            background: var(--gold);
            overflow-y: auto;
            flex: 1;
        }

        .grid-header {
            background: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 8px 2px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            font-size: 10px;
        }

        .category-label {
            background: #111;
            padding: 10px 6px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--gold-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .score-cell {
            background: #0a2e18;
            min-height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            transition: all 0.2s;
        }

        .score-cell.active-turn {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.4);
            cursor: pointer;
        }

        .score-cell.filled {
            color: var(--gold-light);
            background: #051a0d;
        }

        .total-row {
            background: #000 !important;
            font-weight: bold;
            color: var(--gold-light);
            font-size: 18px;
        }

        .char-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            transition: 0.2s;
            font-size: 20px;
            padding: 4px;
            border-radius: 6px;
        }
        .char-btn.selected {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.2);
        }

        .btn-gold {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            color: #222;
            font-weight: 900;
            padding: 14px;
            border-radius: 8px;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #6e4e08;
            width: 100%;
        }
        
        .btn-gold:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #6e4e08;
        }
    </style>
</head>
<body>

<div class="casino-container">
    <!-- Setup Screen -->
    <div id="setup-screen" class="setup-screen">
        <h2 class="cinzel text-2xl text-gold text-center mb-4">Duel Setup</h2>
        
        <div class="setup-scroll" id="player-config-container">
            <div id="player-list" class="space-y-4">
                <!-- Players injected here -->
            </div>
            
            <button id="add-player-btn" onclick="addPlayer()" class="w-full mt-4 border-2 border-dashed border-gold/40 py-4 rounded-xl text-gold/60 font-bold text-sm hover:bg-gold/10 transition-colors">
                + ADD PLAYER (UP TO 4)
            </button>
        </div>

        <div class="pt-4 border-t border-gold/20">
            <button onclick="startGame()" class="btn-gold cinzel text-xl">Start Game</button>
        </div>
    </div>

    <!-- Main Game UI -->
    <div class="flex flex-col h-full">
        <div class="p-3 flex justify-between items-center bg-black/80 border-b border-gold/30">
            <h1 class="cinzel text-md text-gold tracking-widest">Yatzy Duel</h1>
            <div id="turn-banner" class="text-[10px] uppercase text-white font-bold bg-red-600 px-3 py-1 rounded-full shadow-lg"></div>
        </div>

        <div id="game-table" class="score-grid">
            <!-- Grid generated by JS -->
        </div>

        <div class="bg-black p-4 border-t-2 border-gold flex flex-col items-center">
            <button id="extra-roll-btn" onclick="useExtraRoll()" class="hidden border-2 border-gold text-gold px-8 py-2 rounded-full text-xs font-black tracking-widest mb-2 active:bg-gold active:text-black transition-colors">
                ✨ USE EXTRA ROLL
            </button>
            <p class="text-[9px] text-gold/60 uppercase tracking-tighter">Tap your scorecard to enter physical roll score</p>
        </div>
    </div>
</div>

<!-- Score Input Modal -->
<div id="modal" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-center justify-center p-6">
    <div class="bg-neutral-900 border-2 border-gold p-6 rounded-2xl w-full max-w-xs shadow-[0_0_50px_rgba(212,175,55,0.3)]">
        <h3 id="modal-title" class="cinzel text-gold text-center mb-2 text-xl">Score</h3>
        <p id="modal-subtitle" class="text-white/40 text-[10px] text-center mb-4 uppercase">Enter points from your roll</p>
        <input type="number" id="score-input" inputmode="numeric" class="w-full bg-black border-2 border-gold p-4 text-5xl text-center text-gold-light rounded-xl mb-6 font-black outline-none">
        <div class="flex gap-3">
            <button onclick="closeModal()" class="flex-1 py-3 text-white/40 uppercase font-bold text-xs tracking-widest">Cancel</button>
            <button onclick="confirmScore()" class="flex-1 py-3 btn-gold text-xs">Confirm</button>
        </div>
    </div>
</div>

<script>
    const CHARS = ["🐭", "❄️", "🦁", "👽", "🤠", "👿", "🧜‍♀️", "🍎", "🧞‍♂️", "🏹", "🏴‍☠️", "🏰", "🐰", "🥀", "🐾"];
    const CATS = [
        { id: '1', name: 'Ones', icon: '1', type: 'upper' },
        { id: '2', name: 'Twos', icon: '2', type: 'upper' },
        { id: '3', name: 'Threes', icon: '3', type: 'upper' },
        { id: '4', name: 'Fours', icon: '4', type: 'upper' },
        { id: '5', name: 'Fives', icon: '5', type: 'upper' },
        { id: '6', name: 'Sixes', icon: '6', type: 'upper' },
        { id: '3x', name: '3 of a Kind', icon: '3X', type: 'lower' },
        { id: '4x', name: '4 of a Kind', icon: '4X', type: 'lower' },
        { id: 'fh', name: 'Full House', icon: '🏠', type: 'lower' },
        { id: 'ss', name: 'Small Str.', icon: 'S', type: 'lower' },
        { id: 'ls', name: 'Large Str.', icon: 'L', type: 'lower' },
        { id: 'yz', name: 'Yatzy', icon: '⭐', type: 'lower' },
        { id: 'ch', name: 'Chance', icon: '?', type: 'lower' }
    ];

    let players = [
        { name: 'Mickey', icon: '🐭' },
        { name: 'Elsa', icon: '❄️' }
    ];
    
    let currentPlayerIndex = 0;
    let activeSelection = null;

    function init() {
        renderPlayerSetup();
    }

    function renderPlayerSetup() {
        const list = document.getElementById('player-list');
        list.innerHTML = players.map((p, i) => `
            <div class="bg-black/40 p-4 rounded-xl border border-gold/20">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-[10px] text-gold/60 uppercase">Player ${i+1}</p>
                    ${players.length > 2 ? `<button onclick="removePlayer(${i})" class="text-red-500 text-[10px] font-bold">REMOVE</button>` : ''}
                </div>
                <div class="flex gap-3 mb-4">
                    <input type="text" value="${p.name}" oninput="updateName(${i}, this.value)" class="bg-black/60 border border-gold/40 flex-1 p-2 rounded text-sm outline-none text-gold font-bold">
                    <div class="text-2xl bg-black/60 w-12 h-12 flex items-center justify-center rounded border-2 border-gold shadow-inner">${p.icon}</div>
                </div>
                <div class="grid grid-cols-5 gap-2">
                    ${CHARS.map(emoji => `
                        <button onclick="updateIcon(${i}, '${emoji}')" 
                                class="char-btn ${p.icon === emoji ? 'selected' : ''}">
                            ${emoji}
                        </button>
                    `).join('')}
                </div>
            </div>
        `).join('');

        document.getElementById('add-player-btn').style.display = players.length >= 4 ? 'none' : 'block';
    }

    function addPlayer() {
        if (players.length < 4) {
            players.push({ name: `Player ${players.length + 1}`, icon: CHARS[players.length + 2] });
            renderPlayerSetup();
        }
    }

    function removePlayer(idx) {
        players.splice(idx, 1);
        renderPlayerSetup();
    }

    function updateName(idx, val) { players[idx].name = val; }
    function updateIcon(idx, icon) { players[idx].icon = icon; renderPlayerSetup(); }

    function startGame() {
        players = players.map(p => ({
            ...p,
            scores: {},
            extraRollUsed: false,
            bonus: 0,
            total: 0,
            upperSum: 0
        }));
        
        document.getElementById('setup-screen').style.display = 'none';
        updateTurn();
    }

    function renderBoard() {
        const table = document.getElementById('game-table');
        table.style.setProperty('--player-count', players.length);
        
        let html = `<div class="grid-header category-label">Scorecard</div>`;
        players.forEach((p, i) => {
            html += `
                <div class="grid-header flex flex-col items-center justify-center ${currentPlayerIndex === i ? 'bg-gold/10' : ''}">
                    <div class="text-2xl">${p.icon}</div>
                    <div id="roll-tag-${i}" class="text-[8px] font-black tracking-tighter ${p.extraRollUsed ? 'text-white/20 line-through' : 'text-gold-light'}">✨ ROLL</div>
                </div>
            `;
        });

        CATS.forEach(cat => {
            html += `<div class="category-label"><span>${cat.icon}</span> ${cat.name}</div>`;
            players.forEach((p, pIdx) => {
                const score = p.scores[cat.id];
                const isFilled = score !== undefined;
                const isMyTurn = currentPlayerIndex === pIdx;
                
                html += `
                    <div class="score-cell ${isFilled ? 'filled' : ''} ${isMyTurn && !isFilled ? 'active-turn' : ''}" 
                         onclick="openModal(${pIdx}, '${cat.id}')">
                        ${isFilled ? score : ''}
                    </div>
                `;
            });
        });

        // Subtotals and Bonus
        html += `<div class="category-label opacity-40">Upper (0/63)</div>`;
        players.forEach(p => html += `<div class="score-cell text-[10px] opacity-40">${p.upperSum}</div>`);

        html += `<div class="category-label text-green-400">Bonus (+35)</div>`;
        players.forEach(p => html += `<div class="score-cell text-green-400 font-black">${p.bonus > 0 ? '35' : '0'}</div>`);

        html += `<div class="category-label total-row">TOTAL</div>`;
        players.forEach(p => html += `<div class="score-cell total-row">${p.total}</div>`);

        table.innerHTML = html;
    }

    function updateTurn() {
        const p = players[currentPlayerIndex];
        const banner = document.getElementById('turn-banner');
        banner.innerText = `${p.icon} ${p.name.split(' ')[0]}'s turn`;
        
        const extraBtn = document.getElementById('extra-roll-btn');
        extraBtn.style.display = p.extraRollUsed ? 'none' : 'block';
        
        renderBoard();
    }

    function openModal(pIdx, catId) {
        if (currentPlayerIndex !== pIdx || players[pIdx].scores[catId] !== undefined) return;
        activeSelection = { pIdx, catId };
        const cat = CATS.find(c => c.id === catId);
        document.getElementById('modal-title').innerText = `${cat.name}`;
        document.getElementById('score-input').value = "";
        document.getElementById('modal').classList.remove('hidden');
        setTimeout(() => document.getElementById('score-input').focus(), 100);
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function confirmScore() {
        const val = parseInt(document.getElementById('score-input').value);
        if (isNaN(val)) return;
        
        const { pIdx, catId } = activeSelection;
        players[pIdx].scores[catId] = val;
        
        // Calculation
        const p = players[pIdx];
        let upper = 0; let lower = 0;
        CATS.forEach(c => {
            const s = p.scores[c.id] || 0;
            if (c.type === 'upper') upper += s; else lower += s;
        });
        p.upperSum = upper;
        p.bonus = upper >= 63 ? 35 : 0;
        p.total = upper + p.bonus + lower;

        // Next
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        closeModal();
        updateTurn();
    }

    function useExtraRoll() {
        players[currentPlayerIndex].extraRollUsed = true;
        updateTurn();
    }

    init();
</script>

</body>
</html>
