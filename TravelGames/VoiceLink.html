<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice P2P Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .waveform { display: flex; align-items: center; gap: 4px; height: 40px; }
        .bar { width: 4px; border-radius: 2px; background: #22c55e; transition: height 0.1s ease; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .searching { animation: pulse 2s infinite; }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">
    <div class="flex flex-col h-screen max-w-md mx-auto p-6">
        
        <!-- Header -->
        <header class="pt-8 pb-4">
            <h1 class="text-3xl font-black tracking-tighter">VOICE LINK</h1>
            <p id="status" class="text-zinc-500 text-sm font-mono mt-1">INITIALIZING...</p>
        </header>

        <!-- Room Setup View -->
        <div id="setup-view" class="flex-1 flex flex-col justify-center">
            <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
                <label class="block text-xs font-bold text-zinc-500 mb-2 uppercase">Test Room Name</label>
                <input id="roomInput" type="text" placeholder="e.g. apple-banana" 
                    class="w-full bg-black border border-zinc-700 rounded-xl p-4 text-xl font-mono focus:outline-none focus:border-green-500 transition-colors mb-4">
                <button id="joinBtn" class="w-full bg-white text-black font-bold py-4 rounded-xl active:scale-95 transition-transform">
                    JOIN ROOM
                </button>
                <p class="text-[10px] text-zinc-600 mt-4 leading-relaxed">
                    Enter the same name on both devices. Requires HTTPS. 
                    Works across iOS (Safari) and Android (Chrome).
                </p>
            </div>
        </div>

        <!-- Calling View -->
        <div id="call-view" class="hidden flex-1 flex flex-col items-center justify-between py-12">
            <div id="remoteStatus" class="text-center">
                <div class="w-24 h-24 bg-zinc-800 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-zinc-700">
                    <svg id="connIcon" class="text-zinc-500" width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 id="peerIdentity" class="text-xl font-bold italic">Searching for Peer...</h2>
                <p id="callState" class="text-green-500 text-sm mt-2 searching">WAITING</p>
            </div>

            <div id="visualizer" class="waveform opacity-0">
                <div class="bar h-4"></div><div class="bar h-8"></div><div class="bar h-12"></div>
                <div class="bar h-6"></div><div class="bar h-10"></div><div class="bar h-4"></div>
            </div>

            <div class="flex gap-6">
                <button id="muteBtn" class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center active:bg-zinc-700">
                    <svg id="micIcon" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path></svg>
                </button>
                <button id="hangupBtn" class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center active:scale-90 transition-transform">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Using a public signaling demo key (Scaledrone is reliable for quick P2P testing)
        // This is a public test ID for your demonstration.
        const CLIENT_ID = 'ai_p2p_voice_test_123'; 
        const script = document.createElement('script');
        script.src = 'https://cdn.scaledrone.com/scaledrone.min.js';
        document.head.appendChild(script);

        let drone, room, pc, localStream;
        const roomInput = document.getElementById('roomInput');
        const status = document.getElementById('status');
        const setupView = document.getElementById('setup-view');
        const callView = document.getElementById('call-view');

        const configuration = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };

        script.onload = () => {
            status.innerText = "READY TO JOIN";
        };

        document.getElementById('joinBtn').onclick = () => {
            const roomName = roomInput.value.trim();
            if (!roomName) return alert("Enter a room name");
            
            startSignaling(roomName);
            setupView.classList.add('hidden');
            callView.classList.remove('hidden');
        };

        function startSignaling(roomName) {
            drone = new Scaledrone('yS74bqV9v9YmS8uG'); // Demo Key
            
            drone.on('open', error => {
                if (error) return console.error(error);
                room = drone.subscribe(`observable-${roomName}`);
                
                room.on('open', error => {
                    if (error) return console.error(error);
                    status.innerText = `ROOM: ${roomName}`;
                    initWebRTC(true); // Attempt to start as soon as room is joined
                });

                room.on('data', (message, client) => {
                    if (client.id === drone.clientId) return; // Ignore own messages
                    handleSignalingData(message);
                });
            });
        }

        async function initWebRTC(isOfferer) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });
                
                pc = new RTCPeerConnection(configuration);

                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

                pc.onicecandidate = event => {
                    if (event.candidate) sendMessage({ candidate: event.candidate });
                };

                pc.ontrack = event => {
                    const remoteAudio = new Audio();
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.play();
                    onConnected();
                };

                if (isOfferer) {
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    sendMessage({ sdp: offer });
                }
            } catch (e) {
                alert("Camera/Mic permission denied or not on HTTPS");
            }
        }

        async function handleSignalingData(message) {
            if (message.sdp) {
                await pc.setRemoteDescription(new RTCSessionDescription(message.sdp));
                if (pc.remoteDescription.type === 'offer') {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    sendMessage({ sdp: answer });
                }
            } else if (message.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(message.candidate));
            }
        }

        function sendMessage(message) {
            drone.publish({ room: room.name, message });
        }

        function onConnected() {
            document.getElementById('peerIdentity').innerText = "PEER CONNECTED";
            const state = document.getElementById('callState');
            state.innerText = "LIVE";
            state.classList.remove('searching');
            document.getElementById('visualizer').classList.remove('opacity-0');
            document.getElementById('connIcon').classList.add('text-green-500');
        }

        document.getElementById('hangupBtn').onclick = () => window.location.reload();

        document.getElementById('muteBtn').onclick = () => {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('muteBtn').classList.toggle('bg-red-500');
        };
    </script>
</body>
</html>
