<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice P2P Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .waveform { display: flex; align-items: center; gap: 4px; height: 30px; }
        .bar { width: 4px; border-radius: 2px; background: #22c55e; transition: height 0.1s ease; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .searching { animation: pulse 1.5s infinite; }
        #logs { font-size: 10px; font-family: 'Courier New', monospace; background: #000; color: #0f0; border: 1px solid #333; height: 200px; overflow-y: auto; }
        .log-entry { border-bottom: 1px solid #111; padding: 2px 4px; }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">
    <div class="flex flex-col h-screen max-w-md mx-auto p-4">
        
        <header class="py-4 flex justify-between items-center border-b border-zinc-800">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-green-500 underline decoration-2">DEBUG MODE v4</h1>
                <p id="status" class="text-zinc-500 text-[10px] font-mono">OFFLINE</p>
            </div>
            <button onclick="window.location.reload()" class="bg-red-900/30 text-red-500 text-[10px] font-bold px-3 py-1 rounded border border-red-900/50">RESET APP</button>
        </header>

        <!-- Persistent Logs -->
        <div class="mt-4 mb-2">
            <p class="text-[10px] font-bold text-zinc-500 mb-1 uppercase flex justify-between">
                <span>Live Event Log</span>
                <span id="memberCount">Members: 0</span>
            </p>
            <div id="logs" class="rounded shadow-inner"></div>
        </div>

        <!-- Setup View -->
        <div id="setup-view" class="flex-1 flex flex-col justify-center">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                <input id="roomInput" type="text" placeholder="ENTER ROOM NAME" 
                    class="w-full bg-black border border-zinc-700 rounded-lg p-4 text-xl font-mono focus:outline-none focus:border-green-500 mb-4 uppercase text-center">
                <button id="joinBtn" class="w-full bg-green-600 text-white font-bold py-4 rounded-lg active:scale-95 transition-transform">
                    INITIALIZE SYSTEM
                </button>
            </div>
        </div>

        <!-- Calling View -->
        <div id="call-view" class="hidden flex-1 flex flex-col items-center justify-around py-4">
            <div class="text-center">
                <div id="statusCircle" class="w-24 h-24 bg-zinc-900 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-zinc-800 transition-all duration-500">
                    <svg id="connIcon" class="text-zinc-700" width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <h2 id="peerIdentity" class="text-lg font-bold text-zinc-500">NEGOTIATING...</h2>
                <div id="visualizer" class="waveform opacity-0 mt-2 justify-center">
                    <div class="bar h-2"></div><div class="bar h-4"></div><div class="bar h-6"></div><div class="bar h-3"></div><div class="bar h-5"></div>
                </div>
            </div>

            <div class="flex gap-6">
                <button id="muteBtn" class="w-14 h-14 bg-zinc-800 rounded-full flex items-center justify-center border border-zinc-700">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path></svg>
                </button>
                <button id="hangupBtn" class="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
    <script>
        let drone, room, pc, localStream;
        const logEl = document.getElementById('logs');
        const status = document.getElementById('status');
        const memberCountEl = document.getElementById('memberCount');

        function addLog(msg, color = 'white') {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span style="color: #666">[${time}]</span> <span style="color: ${color}">${msg}</span>`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }

        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
        };

        document.getElementById('joinBtn').onclick = async () => {
            const roomName = document.getElementById('roomInput').value.trim().toLowerCase();
            if (!roomName) return alert("Room name required");

            addLog("Requesting Media...", "yellow");
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                addLog("Mic Connected", "#0f0");
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('call-view').classList.remove('hidden');
                startSignaling(roomName);
            } catch (e) {
                addLog("MEDIA ERROR: " + e.message, "red");
            }
        };

        function startSignaling(roomName) {
            drone = new Scaledrone('yS74bqV9v9YmS8uG');
            
            drone.on('open', error => {
                if (error) return addLog("Drone Auth Error", "red");
                addLog("Relay Connected: " + drone.clientId, "#0f0");
                
                room = drone.subscribe(`observable-${roomName}`);
                
                room.on('open', error => {
                    if (error) return addLog("Room Join Fail", "red");
                    addLog("Joined: " + roomName, "#0f0");
                    status.innerText = "SIGNALING ACTIVE";
                });

                room.on('members', members => {
                    memberCountEl.innerText = `Members: ${members.length}`;
                    if (members.length >= 2) {
                        const sortedIds = members.map(m => m.id).sort();
                        const isInitiator = (drone.clientId === sortedIds[0]);
                        addLog(isInitiator ? "ROLE: Initiator (Sending Offer)" : "ROLE: Receiver (Waiting for Offer)", "cyan");
                        initWebRTC(isInitiator);
                    }
                });

                room.on('data', (message, client) => {
                    if (client.id === drone.clientId) return;
                    handleSignalingData(message);
                });
            });
        }

        function initWebRTC(isInitiator) {
            if (pc) return;
            addLog("Creating PeerConnection...", "yellow");
            
            pc = new RTCPeerConnection(configuration);

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = event => {
                if (event.candidate) {
                    addLog("ICE Candidate found", "#666");
                    sendMessage({ candidate: event.candidate });
                }
            };

            pc.oniceconnectionstatechange = () => {
                addLog("ICE State: " + pc.iceConnectionState, "orange");
                if (pc.iceConnectionState === 'failed') {
                    addLog("ICE Failed. Retrying...", "red");
                    pc.restartIce();
                }
            };

            pc.onconnectionstatechange = () => {
                addLog("PC State: " + pc.connectionState, "orange");
                if (pc.connectionState === 'connected') onConnected();
            };

            pc.ontrack = event => {
                addLog("REMOTE TRACK RECEIVED", "#0f0");
                const remoteAudio = new Audio();
                remoteAudio.srcObject = event.streams[0];
                remoteAudio.play().then(() => addLog("Audio Playing", "#0f0"))
                                .catch(e => addLog("Play Blocked: Tap Screen", "yellow"));
            };

            if (isInitiator) {
                pc.onnegotiationneeded = async () => {
                    addLog("Creating Offer...", "cyan");
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    sendMessage({ sdp: offer });
                };
            }
        }

        async function handleSignalingData(message) {
            if (message.sdp) {
                addLog("Received SDP: " + message.sdp.type, "cyan");
                if (!pc) initWebRTC(false);
                
                await pc.setRemoteDescription(new RTCSessionDescription(message.sdp));
                
                if (pc.remoteDescription.type === 'offer') {
                    addLog("Creating Answer...", "cyan");
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    sendMessage({ sdp: answer });
                }
            } else if (message.candidate) {
                if (pc && pc.remoteDescription) {
                    await pc.addIceCandidate(new RTCIceCandidate(message.candidate));
                }
            }
        }

        function sendMessage(message) {
            drone.publish({ room: room.name, message });
        }

        function onConnected() {
            document.getElementById('peerIdentity').innerText = "LIVE CONNECTION";
            document.getElementById('peerIdentity').className = "text-lg font-bold text-green-500";
            document.getElementById('visualizer').classList.remove('opacity-0');
            document.getElementById('statusCircle').className = "w-24 h-24 bg-green-900/20 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-green-500";
            document.getElementById('connIcon').classList.replace('text-zinc-700', 'text-green-500');
        }

        document.getElementById('hangupBtn').onclick = () => window.location.reload();
        document.getElementById('muteBtn').onclick = () => {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('muteBtn').classList.toggle('bg-red-600');
        };
    </script>
</body>
</html>
