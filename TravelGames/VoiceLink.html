<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Link Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .waveform { display: flex; align-items: center; gap: 4px; height: 30px; }
        .bar { width: 4px; border-radius: 2px; background: #22c55e; transition: height 0.1s ease; }
        @keyframes pulse-ring { 0% { transform: scale(.33); opacity: 1; } 80%, 100% { opacity: 0; } }
        .pulse-btn::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            border: 4px solid #22c55e; border-radius: 9999px;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        #logs { font-size: 10px; font-family: monospace; background: #000; color: #0f0; height: 120px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">
    <div class="flex flex-col h-screen max-w-md mx-auto p-4">
        
        <header class="py-6 border-b border-zinc-800">
            <h1 class="text-2xl font-black tracking-tighter text-green-500">VOICE LINK <span class="text-xs font-normal text-zinc-500 ml-2">V7</span></h1>
            <div id="connectionStatus" class="flex items-center gap-2 mt-1">
                <div id="statusDot" class="w-2 h-2 rounded-full bg-red-500"></div>
                <p id="statusText" class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Disconnected</p>
            </div>
        </header>

        <!-- Debug Console -->
        <div class="mt-4">
            <div id="logs" class="p-2 rounded-lg shadow-inner">
                <div>> System ready. Select a room to start.</div>
            </div>
        </div>

        <!-- Room Selector -->
        <div id="setup-view" class="flex-1 flex flex-col justify-center gap-4">
            <p class="text-center text-zinc-500 text-xs uppercase font-bold tracking-widest mb-2">Select a testing room</p>
            
            <div class="grid grid-cols-1 gap-3">
                <button onclick="joinRoom('LEVELVAN-A')" class="bg-zinc-900 border border-zinc-800 hover:border-green-500 p-6 rounded-2xl flex justify-between items-center active:scale-95 transition-all group">
                    <span class="font-bold group-hover:text-green-400">ROOM ALPHA</span>
                    <span class="text-[10px] bg-zinc-800 px-3 py-1 rounded border border-zinc-700">JOIN</span>
                </button>
                <button onclick="joinRoom('LEVELVAN-B')" class="bg-zinc-900 border border-zinc-800 hover:border-green-500 p-6 rounded-2xl flex justify-between items-center active:scale-95 transition-all group">
                    <span class="font-bold group-hover:text-green-400">ROOM BETA</span>
                    <span class="text-[10px] bg-zinc-800 px-3 py-1 rounded border border-zinc-700">JOIN</span>
                </button>
            </div>
        </div>

        <!-- Calling View -->
        <div id="call-view" class="hidden flex-1 flex flex-col items-center justify-around py-8">
            <div class="text-center">
                <div id="statusCircle" class="w-32 h-32 bg-zinc-900 rounded-full mx-auto mb-6 flex items-center justify-center border-2 border-zinc-800 transition-all relative">
                    <svg id="connIcon" class="text-zinc-700" width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path>
                    </svg>
                </div>
                <h2 id="peerIdentity" class="text-xl font-black italic text-zinc-600 uppercase">Searching...</h2>
                <div id="visualizer" class="waveform opacity-0 mt-4 justify-center">
                    <div class="bar h-2 animate-bounce"></div>
                    <div class="bar h-5 animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="bar h-8 animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="bar h-4 animate-bounce" style="animation-delay: 0.3s"></div>
                    <div class="bar h-6 animate-bounce" style="animation-delay: 0.4s"></div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-6">
                <div class="flex gap-8">
                    <!-- Mute Button -->
                    <div class="flex flex-col items-center gap-2">
                        <button id="muteBtn" class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center border border-zinc-700 active:bg-zinc-700 transition-colors">
                            <svg id="micIcon" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path></svg>
                        </button>
                        <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-tighter">Mute</span>
                    </div>

                    <!-- Hangup Button -->
                    <div class="flex flex-col items-center gap-2">
                        <button id="hangupBtn" class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center active:scale-90 transition-transform shadow-lg shadow-red-900/40">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                        <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-tighter">End Call</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let peer, localStream, currentCall;
        const logEl = document.getElementById('logs');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        function addLog(msg, color = '#0f0') {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            const div = document.createElement('div');
            div.innerHTML = `<span style="color: #444">[${time}]</span> <span style="color: ${color}">${msg}</span>`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function joinRoom(roomName) {
            addLog(`Requesting Mic Access...`, 'yellow');
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                addLog(`Mic active.`, '#0f0');
                
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('call-view').classList.remove('hidden');
                
                initHandshake(roomName);
            } catch (e) {
                addLog(`MIC ERROR: ${e.message}`, 'red');
            }
        }

        function initHandshake(roomName) {
            const idA = `${roomName}-A`;
            const idB = `${roomName}-B`;

            const tryRegister = (targetId, partnerId) => {
                const p = new Peer(targetId, { debug: 1 });

                p.on('open', () => {
                    addLog(`ID: ${targetId} (Ready)`, 'cyan');
                    peer = p;
                    statusText.innerText = `WAITING IN ${roomName}`;
                    statusDot.className = "w-2 h-2 rounded-full bg-yellow-500";

                    peer.on('call', incoming => {
                        addLog(`Call incoming...`, 'yellow');
                        incoming.answer(localStream);
                        handleStream(incoming);
                    });

                    // Try to call the partner after a short delay
                    setTimeout(() => {
                        addLog(`Pinging peer...`, '#666');
                        const call = peer.call(partnerId, localStream);
                        if (call) handleStream(call);
                    }, 1500);
                });

                p.on('error', (err) => {
                    if (err.type === 'unavailable-id') {
                        addLog(`ID busy, swapping role...`);
                        tryRegister(partnerId, targetId);
                    } else {
                        addLog(`Connection Error: ${err.type}`, 'red');
                    }
                });
            };

            tryRegister(idA, idB);
        }

        function handleStream(call) {
            currentCall = call;
            call.on('stream', (remoteStream) => {
                addLog(`LIVE STREAM ESTABLISHED`, '#0f0');
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play().then(() => onConnected()).catch(e => {
                    addLog(`Tap screen to hear audio!`, 'yellow');
                    window.addEventListener('touchstart', () => audio.play(), {once:true});
                });
            });
            
            call.on('close', () => {
                addLog("Call ended by peer.", "orange");
                exitSession();
            });
        }

        function onConnected() {
            statusText.innerText = "CONNECTED";
            statusDot.className = "w-2 h-2 rounded-full bg-green-500";
            document.getElementById('peerIdentity').innerText = "PEER ACTIVE";
            document.getElementById('peerIdentity').className = "text-xl font-black italic text-green-500 uppercase";
            document.getElementById('visualizer').classList.remove('opacity-0');
            document.getElementById('statusCircle').classList.add('pulse-btn', 'border-green-500', 'bg-green-900/20');
            document.getElementById('connIcon').classList.replace('text-zinc-700', 'text-green-500');
        }

        function exitSession() {
            if (currentCall) currentCall.close();
            if (peer) {
                peer.disconnect();
                peer.destroy();
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            window.location.reload();
        }

        document.getElementById('hangupBtn').onclick = exitSession;

        document.getElementById('muteBtn').onclick = () => {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            
            const btn = document.getElementById('muteBtn');
            const icon = document.getElementById('micIcon');
            
            if (track.enabled) {
                btn.className = "w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center border border-zinc-700 active:bg-zinc-700 transition-colors";
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path>';
            } else {
                btn.className = "w-16 h-16 bg-red-900/50 rounded-full flex items-center justify-center border border-red-500 active:bg-red-900 transition-colors";
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728L5.636 5.636"></path>';
                addLog("Microphone Muted", "orange");
            }
        };
    </script>
</body>
</html>
