<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice P2P Tester (PeerJS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .waveform { display: flex; align-items: center; gap: 4px; height: 30px; }
        .bar { width: 4px; border-radius: 2px; background: #22c55e; transition: height 0.1s ease; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .searching { animation: pulse 1.5s infinite; }
        #logs { font-size: 10px; font-family: 'Courier New', monospace; background: #000; color: #0f0; border: 1px solid #333; height: 180px; overflow-y: auto; }
        .log-entry { border-bottom: 1px solid #111; padding: 2px 4px; }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">
    <div class="flex flex-col h-screen max-w-md mx-auto p-4">
        
        <header class="py-4 flex justify-between items-center border-b border-zinc-800">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-green-500 underline decoration-2">VOICE TEST v5</h1>
                <p id="status" class="text-zinc-500 text-[10px] font-mono uppercase">Initializing PeerJS...</p>
            </div>
            <button onclick="window.location.reload()" class="bg-red-900/30 text-red-500 text-[10px] font-bold px-3 py-1 rounded border border-red-900/50">RELOAD</button>
        </header>

        <!-- Live Log Area -->
        <div class="mt-4 mb-2">
            <p class="text-[10px] font-bold text-zinc-500 mb-1 uppercase flex justify-between">
                <span>Network Debug Console</span>
                <span id="myIdDisplay">ID: ...</span>
            </p>
            <div id="logs" class="rounded shadow-inner"></div>
        </div>

        <!-- Setup View -->
        <div id="setup-view" class="flex-1 flex flex-col justify-center gap-4">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                <p class="text-[10px] text-zinc-500 uppercase mb-2 font-bold">1. Share your ID or Enter Peer ID</p>
                <input id="peerIdInput" type="text" placeholder="PASTE PEER ID HERE" 
                    class="w-full bg-black border border-zinc-700 rounded-lg p-4 text-sm font-mono focus:outline-none focus:border-green-500 mb-4 uppercase text-center">
                
                <button id="callBtn" class="w-full bg-green-600 text-white font-bold py-4 rounded-lg active:scale-95 transition-transform mb-2">
                    START VOICE CALL
                </button>
                
                <div class="text-center mt-2">
                    <button id="copyIdBtn" class="text-[10px] text-zinc-400 underline uppercase tracking-widest">
                        Copy My ID to Clipboard
                    </button>
                </div>
            </div>
            <p class="text-[10px] text-center text-zinc-600 leading-relaxed italic px-4">
                Open this on two phones. Copy the ID from Phone A, paste it into Phone B, and hit Start Voice Call.
            </p>
        </div>

        <!-- Calling View -->
        <div id="call-view" class="hidden flex-1 flex flex-col items-center justify-around py-4">
            <div class="text-center">
                <div id="statusCircle" class="w-24 h-24 bg-zinc-900 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-zinc-800 transition-all duration-500">
                    <svg id="connIcon" class="text-zinc-700" width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path>
                    </svg>
                </div>
                <h2 id="peerIdentity" class="text-lg font-bold text-zinc-500 uppercase">Connecting Stream...</h2>
                <div id="visualizer" class="waveform opacity-0 mt-2 justify-center">
                    <div class="bar h-2"></div><div class="bar h-4"></div><div class="bar h-6"></div><div class="bar h-3"></div><div class="bar h-5"></div>
                </div>
            </div>

            <div class="flex gap-6">
                <button id="muteBtn" class="w-14 h-14 bg-zinc-800 rounded-full flex items-center justify-center border border-zinc-700">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path></svg>
                </button>
                <button id="hangupBtn" class="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let peer, localStream, currentCall;
        const logEl = document.getElementById('logs');
        const myIdDisplay = document.getElementById('myIdDisplay');
        const statusText = document.getElementById('status');

        function addLog(msg, color = 'white') {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span style="color: #666">[${time}]</span> <span style="color: ${color}">${msg}</span>`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // 1. Initialize PeerJS
        // We use a clean initialization without explicit ID to let PeerJS generate one.
        peer = new Peer({
            debug: 2,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        peer.on('open', (id) => {
            addLog("PeerJS Cloud Connected", "#0f0");
            addLog("My ID: " + id, "cyan");
            myIdDisplay.innerText = "ID: " + id;
            statusText.innerText = "ONLINE & READY";
        });

        peer.on('error', (err) => {
            addLog("NETWORK ERROR: " + err.type, "red");
            statusText.innerText = "OFFLINE: " + err.type;
        });

        // 2. Handle Incoming Call
        peer.on('call', async (call) => {
            addLog("Incoming call from peer...", "yellow");
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                addLog("Mic opened for answering", "#0f0");
                
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('call-view').classList.remove('hidden');
                
                call.answer(localStream);
                setupCallHandlers(call);
            } catch (e) {
                addLog("Answer Error: " + e.message, "red");
            }
        });

        // 3. Initiate Call
        document.getElementById('callBtn').onclick = async () => {
            const remoteId = document.getElementById('peerIdInput').value.trim();
            if (!remoteId) return alert("Please enter the Peer ID from the other phone");

            addLog("Requesting local mic...", "yellow");
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                addLog("Mic active, calling: " + remoteId, "cyan");
                
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('call-view').classList.remove('hidden');
                
                const call = peer.call(remoteId, localStream);
                setupCallHandlers(call);
            } catch (e) {
                addLog("Call Error: " + e.message, "red");
            }
        };

        function setupCallHandlers(call) {
            currentCall = call;
            
            call.on('stream', (remoteStream) => {
                addLog("REMOTE AUDIO RECEIVED", "#0f0");
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play().then(() => {
                    addLog("Audio playing through speakers", "#0f0");
                    onConnected();
                }).catch(err => {
                    addLog("Auto-play blocked: Tap screen!", "yellow");
                    // Force play on first touch
                    window.addEventListener('click', () => audio.play(), { once: true });
                });
            });

            call.on('close', () => {
                addLog("Call ended by peer", "orange");
                window.location.reload();
            });

            call.on('error', (err) => {
                addLog("Call P2P Error: " + err, "red");
            });
        }

        function onConnected() {
            document.getElementById('peerIdentity').innerText = "LIVE CONNECTION";
            document.getElementById('peerIdentity').className = "text-lg font-bold text-green-500 uppercase tracking-widest";
            document.getElementById('visualizer').classList.remove('opacity-0');
            document.getElementById('statusCircle').className = "w-24 h-24 bg-green-900/20 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-green-500 pulse";
            document.getElementById('connIcon').className = "text-green-500 animate-pulse";
        }

        document.getElementById('copyIdBtn').onclick = () => {
            const idText = myIdDisplay.innerText.replace("ID: ", "");
            const tempInput = document.createElement("input");
            tempInput.value = idText;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            addLog("ID Copied to clipboard", "white");
            alert("Your ID is copied. Paste it into the other phone.");
        };

        document.getElementById('hangupBtn').onclick = () => window.location.reload();
        
        document.getElementById('muteBtn').onclick = () => {
            if (localStream) {
                const track = localStream.getAudioTracks()[0];
                track.enabled = !track.enabled;
                document.getElementById('muteBtn').classList.toggle('bg-red-600');
            }
        };
    </script>
</body>
</html>
