<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Link Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .waveform { display: flex; align-items: center; gap: 4px; height: 30px; }
        .bar { width: 4px; border-radius: 2px; background: #22c55e; transition: height 0.1s ease; }
        @keyframes pulse-ring { 0% { transform: scale(.33); opacity: 1; } 80%, 100% { opacity: 0; } }
        .pulse-btn::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            border: 4px solid #22c55e; border-radius: 9999px;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        #logs { font-size: 10px; font-family: monospace; background: #000; color: #0f0; height: 150px; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">
    <div class="flex flex-col h-screen max-w-md mx-auto p-4">
        
        <header class="py-6 border-b border-zinc-800">
            <h1 class="text-2xl font-black tracking-tighter text-green-500">VOICE LINK <span class="text-xs font-normal text-zinc-500 ml-2">V6</span></h1>
            <div id="connectionStatus" class="flex items-center gap-2 mt-1">
                <div id="statusDot" class="w-2 h-2 rounded-full bg-red-500"></div>
                <p id="statusText" class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest">Disconnected</p>
            </div>
        </header>

        <!-- Debug Console (Always Visible) -->
        <div class="mt-4">
            <div id="logs" class="p-2 rounded-lg shadow-inner">
                <div>> System initialized. Select a room below.</div>
            </div>
        </div>

        <!-- Room Selector -->
        <div id="setup-view" class="flex-1 flex flex-col justify-center gap-4">
            <p class="text-center text-zinc-500 text-xs uppercase font-bold tracking-widest mb-2">Select a testing room</p>
            
            <div class="grid grid-cols-1 gap-3">
                <button onclick="joinRoom('LEVELVAN-A')" class="bg-zinc-900 border border-zinc-800 hover:border-green-500 p-6 rounded-2xl flex justify-between items-center active:scale-95 transition-all">
                    <span class="font-bold">ROOM ALPHA</span>
                    <span class="text-[10px] bg-zinc-800 px-2 py-1 rounded">JOIN</span>
                </button>
                <button onclick="joinRoom('LEVELVAN-B')" class="bg-zinc-900 border border-zinc-800 hover:border-green-500 p-6 rounded-2xl flex justify-between items-center active:scale-95 transition-all">
                    <span class="font-bold">ROOM BETA</span>
                    <span class="text-[10px] bg-zinc-800 px-2 py-1 rounded">JOIN</span>
                </button>
            </div>
            
            <p class="text-[10px] text-center text-zinc-600 mt-4">Tapping a room name on both devices will automatically link them via PeerJS.</p>
        </div>

        <!-- Calling View -->
        <div id="call-view" class="hidden flex-1 flex flex-col items-center justify-around py-8">
            <div class="text-center">
                <div id="statusCircle" class="w-32 h-32 bg-zinc-900 rounded-full mx-auto mb-6 flex items-center justify-center border-2 border-zinc-800 transition-all">
                    <svg id="connIcon" class="text-zinc-700" width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path>
                    </svg>
                </div>
                <h2 id="peerIdentity" class="text-xl font-black italic text-zinc-600 uppercase">Searching...</h2>
                <div id="visualizer" class="waveform opacity-0 mt-4 justify-center">
                    <div class="bar h-2"></div><div class="bar h-5"></div><div class="bar h-8"></div><div class="bar h-4"></div><div class="bar h-6"></div>
                </div>
            </div>

            <div class="flex gap-8">
                <button id="muteBtn" class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center border border-zinc-700 active:bg-zinc-700">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m14 0a7 7 0 00-14 0m14 0v4m0 0H5m14 0h-4M5 11V5a3 3 0 016 0v6a3 3 0 01-6 0z"></path></svg>
                </button>
                <button id="hangupBtn" class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center active:scale-90">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let peer, localStream, currentCall, myRoomId;
        const logEl = document.getElementById('logs');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        function addLog(msg, color = '#0f0') {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            const div = document.createElement('div');
            div.innerHTML = `<span style="color: #444">[${time}]</span> <span style="color: ${color}">${msg}</span>`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function joinRoom(roomName) {
            addLog(`Requesting Microphone...`, 'yellow');
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });
                addLog(`Mic active.`, '#0f0');
                
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('call-view').classList.remove('hidden');
                
                initPeer(roomName);
            } catch (e) {
                addLog(`MEDIA ERROR: ${e.message}`, 'red');
                alert("Please enable microphone access and use HTTPS.");
            }
        }

        function initPeer(roomName) {
            // We use a deterministic naming scheme: RoomName-1 and RoomName-2
            // Since we don't know who is who, we try to "Connect to 1" then "Connect to 2"
            
            peer = new Peer(null, {
                debug: 2,
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', (id) => {
                addLog(`PeerID: ${id.substring(0,8)}...`, 'cyan');
                statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                statusText.innerText = "Searching for peer...";
                
                // Now we need to find the other person. 
                // We'll use a simple "discovery" logic:
                // We broadcast our presence to a simple relay or just try to call the "Room"
                // Actually, PeerJS doesn't support "rooms" directly.
                // WORKAROUND: We use the room name to seed the Peer ID.
                
                // Let's try a different strategy: One phone is suffix '-A', other is '-B'
                // But the user doesn't want to choose A or B.
                // Let's use a small "collision" strategy.
            });

            // Handle incoming calls automatically
            peer.on('call', (call) => {
                addLog(`Incoming call! Answering...`, 'yellow');
                call.answer(localStream);
                handleCall(call);
            });

            // To make it "click and work", we'll attempt to call both variations
            // of the room name every few seconds until someone answers.
            const attemptCall = () => {
                // This part is tricky without a coordinator. 
                // Let's use the roomName as a "namespace" on a public signaling channel
                // But for THIS test, let's keep it simple:
                // We will register as a random ID, but we'll send our ID to a 
                // simple public KV store (simulated here with a fetch)
                
                // Actually, let's use the PeerJS 'room' logic by hashing the room name
                // into two possible IDs.
                const idA = `${roomName}-A`;
                const idB = `${roomName}-B`;
                
                // Try to register as A. If taken, register as B.
                const tryRegister = (targetId, fallbackId) => {
                    const p = new Peer(targetId, { debug: 1 });
                    p.on('open', () => {
                        addLog(`Registered as ${targetId}`, 'cyan');
                        peer = p;
                        peer.on('call', c => { c.answer(localStream); handleCall(c); });
                        // Now wait. If the other person is already fallbackId, call them.
                        setTimeout(() => {
                            addLog(`Checking for peer ${fallbackId}...`, '#666');
                            const call = peer.call(fallbackId, localStream);
                            handleCall(call);
                        }, 2000);
                    });
                    p.on('error', (err) => {
                        if (err.type === 'unavailable-id') {
                            addLog(`${targetId} taken, trying ${fallbackId}...`);
                            tryRegister(fallbackId, targetId);
                        } else {
                            addLog(`Error: ${err.type}`, 'red');
                        }
                    });
                };
                
                peer.destroy();
                tryRegister(idA, idB);
            };
            
            attemptCall();
        }

        function handleCall(call) {
            currentCall = call;
            call.on('stream', (remoteStream) => {
                addLog(`STREAM RECEIVED`, '#0f0');
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play().then(() => {
                    onConnected();
                }).catch(e => {
                    addLog(`Auto-play blocked. Tap screen.`, 'yellow');
                    window.addEventListener('click', () => audio.play(), {once:true});
                });
            });
            call.on('close', () => window.location.reload());
        }

        function onConnected() {
            statusText.innerText = "Live Voice";
            document.getElementById('peerIdentity').innerText = "PEER CONNECTED";
            document.getElementById('peerIdentity').className = "text-xl font-black italic text-green-500 uppercase";
            document.getElementById('visualizer').classList.remove('opacity-0');
            document.getElementById('statusCircle').classList.replace('bg-zinc-900', 'bg-green-900/20');
            document.getElementById('statusCircle').classList.replace('border-zinc-800', 'border-green-500');
            document.getElementById('statusCircle').classList.add('pulse-btn');
            document.getElementById('connIcon').className = "text-green-500";
        }

        document.getElementById('hangupBtn').onclick = () => window.location.reload();
        document.getElementById('muteBtn').onclick = () => {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('muteBtn').classList.toggle('bg-red-600');
        };
    </script>
</body>
</html>
