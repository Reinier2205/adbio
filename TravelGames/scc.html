<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Captain's Table - Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;900&display=swap" rel="stylesheet">
    <!-- PeerJS for Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <!-- Multiplayer Library -->
    <script src="https://travel-games.pages.dev/lcr-multiplayer.js"></script>
    <style>
        :root {
            --felt-green: #0a4821;
            --gold: #d4af37;
            --gold-light: #ffd700;
            --glass: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #051a0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #fff8e1;
        }

        .casino-container {
            background: var(--felt-green);
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 70%);
            border: 10px solid #2c1a12;
            box-shadow: 0 0 0 2px var(--gold), 0 30px 60px rgba(0,0,0,0.9);
            border-radius: 30px;
            width: 95vw;
            height: 92vh;
            max-width: 400px;
            max-height: 800px;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
        }

        .cinzel { font-family: 'Cinzel', serif; }

        .duel-dashboard {
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
        }

        .player-status {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s;
            opacity: 0.5;
        }

        .player-status.active-turn {
            opacity: 1;
            transform: scale(1.1);
        }

        .orb-outer {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: #111;
            position: relative;
            overflow: hidden;
        }

        .orb-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 0.8s ease-out;
        }

        .die {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1a0f12;
            font-size: 24px;
            font-weight: 900;
            box-shadow: 0 4px 0 #bbb;
            transition: all 0.2s;
        }

        .die.locked {
            background: var(--gold-light);
            box-shadow: 0 0 15px var(--gold-light), 0 2px 0 #b8860b;
            transform: translateY(-4px);
            border: 2px solid white;
        }

        .die.cargo {
            background: #222;
            color: var(--gold);
            border: 1px solid var(--gold);
            box-shadow: 0 4px 0 #000;
        }

        .manifest-hud {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .req-box {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            opacity: 0.3;
            transition: 0.3s;
        }

        .req-box.met {
            opacity: 1;
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .btn-action {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            color: #2e1a05;
            font-weight: 900;
            text-transform: uppercase;
            padding: 14px;
            border-radius: 50px;
            width: 100%;
            box-shadow: 0 4px 0 #6e4e08;
        }

        .btn-action:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #6e4e08;
        }

        .btn-action:disabled {
            filter: grayscale(1);
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="casino-container">
        <!-- Dashboard -->
        <div id="dashboard" class="duel-dashboard">
            <!-- Seats generated dynamically -->
        </div>

        <div id="log" class="text-center text-[10px] text-gold/60 tracking-widest uppercase py-2">Waiting for Game Start</div>

        <!-- Table -->
        <div class="flex-1 flex flex-col justify-center items-center">
            <div id="dice-container" class="flex flex-wrap justify-center gap-3"></div>
            
            <div id="cargo-hud" class="mt-6 text-center opacity-0 transition-opacity">
                <p class="text-[10px] text-white/40 uppercase tracking-widest">Cargo Scored</p>
                <h2 id="cargo-val" class="cinzel text-5xl text-white">0</h2>
            </div>
        </div>

        <!-- Requirements -->
        <div class="manifest-hud">
            <div id="req-6" class="req-box"><span class="block text-[8px] uppercase text-gold">Ship</span><span class="cinzel text-2xl">6</span></div>
            <div id="req-5" class="req-box"><span class="block text-[8px] uppercase text-gold">Captain</span><span class="cinzel text-2xl">5</span></div>
            <div id="req-4" class="req-box"><span class="block text-[8px] uppercase text-gold">Crew</span><span class="cinzel text-2xl">4</span></div>
        </div>

        <!-- Controls -->
        <div class="space-y-2 pb-4">
            <div class="text-center">
                <span id="roll-label" class="text-[9px] bg-black/40 px-3 py-1 rounded-full text-zinc-400 uppercase tracking-widest">Roll 1 / 3</span>
            </div>
            <button id="roll-btn" class="btn-action" onclick="handleRoll()">Cast Dice</button>
            <button id="bank-btn" class="hidden w-full text-[10px] text-white/40 py-2 uppercase tracking-widest" onclick="handleBank()">Keep Cargo Early</button>
        </div>
    </div>

    <script>
        // --- Multiplayer Config ---
        let mpMode = 'single';
        let mpHost = null;
        let mpGuest = null;
        let myPlayerIndex = null;
        const MAX_PLAYERS = 2; 

        // --- Game State ---
        let players = [];
        let turnIndex = 0;
        let rollsCount = 0;
        let dice = [1, 1, 1, 1, 1];
        let locked = [false, false, false, false, false];
        let found = { 6: false, 5: false, 4: false };
        let isProcessing = false;

        const CHARACTERS = [
            { name: "Scurvy Sam", icon: "🏴‍☠️" },
            { name: "Captain Goldbeard", icon: "🪙" },
            { name: "Blind Betsy", icon: "⚓" },
            { name: "Admiral Iron", icon: "⚔️" }
        ];

        window.onload = () => {
            const hashPin = _parseHashPin();
            if (hashPin) {
                _startGuestFlow(hashPin);
            } else {
                LCRMultiplayer.UI.showModeSelectionThree(
                    () => { mpMode = 'single'; _initSinglePlayer(); },
                    () => _startHostFlow(),
                    () => _startGuestFlow(null)
                );
            }
        };

        function _parseHashPin() {
            const m = window.location.hash.match(/^#LCP:(\d{4})$/);
            return m ? m[1] : null;
        }

        function _initSinglePlayer() {
            players = [
                { name: "Player 1", icon: "⚔️", score: 0 },
                { name: "Player 2", icon: "🏴‍☠️", score: 0 }
            ];
            myPlayerIndex = 0;
            resetTurn();
            updateUI();
        }

        async function _startHostFlow() {
            mpMode = 'host';
            myPlayerIndex = 0;
            const adapter = _buildGameAdapter();
            mpHost = new LCRMultiplayer.MultiplayerHost(adapter, MAX_PLAYERS);
            
            try {
                await mpHost.open();
                LCRMultiplayer.UI.showGuestCharacterPicker({
                    pool: CHARACTERS,
                    takenNames: [],
                    onPick: ({ name, icon }) => {
                        mpHost.hostPick(name, icon);
                        _showHostLobby();
                    }
                });
            } catch(e) { location.reload(); }
        }

        function _showHostLobby() {
            const lobbyUI = LCRMultiplayer.UI.showHostLobby({
                pin: mpHost.pin,
                onShareLink: () => _shareLink(mpHost.pin),
                onDealIn: () => _dealIn()
            });
            mpHost.onGuestConnected = (count) => lobbyUI.updateCount(count + 1);
            mpHost.onGuestPicked = (conns) => {
                lobbyUI.updateCount(conns.length + 1);
                if (conns.length >= 1 && conns.every(e => e.picked)) lobbyUI.enableDealIn();
            };
        }

        function _dealIn() {
            const picks = mpHost.buildPlayersFromPicks();
            players = picks.map((p, i) => ({ ...p, score: 0 }));
            resetTurn();
            mpHost.broadcastState(mpHost.gameAdapter.getState());
            _showGamePin(mpHost.pin);
            updateUI();
        }

        async function _startGuestFlow(pin) {
            mpMode = 'guest';
            const adapter = _buildGameAdapter();
            mpGuest = new LCRMultiplayer.MultiplayerGuest(adapter);
            
            const pinUI = LCRMultiplayer.UI.showGuestPinEntry({
                prefillPin: pin || '',
                onConnect: async (p) => {
                    try {
                        await mpGuest.connect(p);
                        pinUI.remove();
                        _showGuestCharacterPicker();
                    } catch(e) { pinUI.showError('Host not found'); }
                },
                onBack: () => location.reload()
            });
        }

        function _showGuestCharacterPicker() {
            const pickerUI = LCRMultiplayer.UI.showGuestCharacterPicker({
                pool: CHARACTERS,
                takenNames: mpGuest._lobbyTakenNames || [],
                onPick: ({ name, icon }) => {
                    mpGuest.sendAction({ type: 'pick', name, icon });
                    LCRMultiplayer.UI.showGuestWaiting();
                }
            });
            mpGuest.onLobbyState = (taken) => pickerUI.updateTaken(taken);
        }

        function _buildGameAdapter() {
            return {
                getState() {
                    return { players, turnIndex, rollsCount, dice, locked, found, isProcessing };
                },
                applyState(state) {
                    players = state.players;
                    turnIndex = state.turnIndex;
                    rollsCount = state.rollsCount;
                    dice = state.dice;
                    locked = state.locked;
                    found = state.found;
                    isProcessing = state.isProcessing;
                    updateUI();
                    _updateTurnUI();
                },
                executeRoll() {
                    _doRollLogic();
                    return this.getState();
                },
                executeTarget(targetIndex, mode) {
                    if (mode === 'bank') _doBankLogic();
                    return this.getState();
                },
                handleDisconnect(idx) {
                    players[idx].score = 0;
                    players[idx].connected = false;
                    return this.getState();
                },
                onAssigned(idx) { myPlayerIndex = idx; },
                onHostDisconnected() { LCRMultiplayer.UI.showHostDisconnected(); }
            };
        }

        function resetTurn() {
            rollsCount = 0;
            dice = [1, 1, 1, 1, 1];
            locked = [false, false, false, false, false];
            found = { 6: false, 5: false, 4: false };
            isProcessing = false;
        }

        function _doRollLogic() {
            if (rollsCount >= 3) return;
            rollsCount++;
            
            dice = dice.map((v, i) => locked[i] ? v : Math.floor(Math.random() * 6) + 1);
            
            if (!found[6]) {
                const idx = dice.findIndex((v, i) => v === 6 && !locked[i]);
                if (idx !== -1) { found[6] = true; locked[idx] = true; }
            }
            if (found[6] && !found[5]) {
                const idx = dice.findIndex((v, i) => v === 5 && !locked[i]);
                if (idx !== -1) { found[5] = true; locked[idx] = true; }
            }
            if (found[6] && found[5] && !found[4]) {
                const idx = dice.findIndex((v, i) => v === 4 && !locked[i]);
                if (idx !== -1) { found[4] = true; locked[idx] = true; }
            }

            if (rollsCount >= 3) _doBankLogic();
        }

        function _doBankLogic() {
            let cargo = 0;
            if (found[4]) {
                dice.forEach((v, i) => { if (!locked[i]) cargo += v; });
            }
            players[turnIndex].score = cargo;
            
            if (turnIndex === 0) {
                turnIndex = 1;
                resetTurn();
            } else {
                // Game finished logic handled by UI
            }
        }

        async function handleRoll() {
            if (isProcessing || rollsCount >= 3) return;
            if (mpMode === 'guest') {
                mpGuest.sendAction({ type: 'roll' });
                return;
            }
            if (mpMode === 'host') {
                const newState = mpHost.gameAdapter.executeRoll();
                mpHost.broadcastState(newState);
                return;
            }
            _doRollLogic();
            updateUI();
        }

        function handleBank() {
            if (mpMode === 'guest') {
                mpGuest.sendAction({ type: 'target', targetIndex: 0, mode: 'bank' });
                return;
            }
            if (mpMode === 'host') {
                const newState = mpHost.gameAdapter.executeTarget(0, 'bank');
                mpHost.broadcastState(newState);
                return;
            }
            _doBankLogic();
            updateUI();
        }

        function updateUI() {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = '';
            players.forEach((p, i) => {
                const active = turnIndex === i;
                const you = (mpMode !== 'single' && i === myPlayerIndex) ? `<span style="font-size:7px;background:var(--gold);color:#000;padding:0 3px;border-radius:3px;font-weight:900">YOU</span>` : '';
                const orbHeight = (p.score / 12) * 100;
                
                dash.innerHTML += `
                    <div class="player-status ${active ? 'active-turn' : ''}">
                        ${you}
                        <span class="text-[9px] uppercase font-bold text-white/60 mb-1">${p.icon} ${p.name}</span>
                        <div class="orb-outer">
                            <div class="orb-fill bg-gold" style="height: ${orbHeight}%"></div>
                        </div>
                        <div class="cinzel text-xl mt-1">${p.score === undefined ? '--' : p.score}</div>
                    </div>
                `;
            });

            const container = document.getElementById('dice-container');
            container.innerHTML = '';
            dice.forEach((val, i) => {
                let type = locked[i] ? "locked" : (found[4] ? "cargo" : "");
                container.innerHTML += `<div class="die ${type}">${val}</div>`;
            });

            document.getElementById('roll-label').innerText = `Roll ${rollsCount} / 3`;
            document.getElementById('req-6').className = `req-box ${found[6] ? 'met' : ''}`;
            document.getElementById('req-5').className = `req-box ${found[5] ? 'met' : ''}`;
            document.getElementById('req-4').className = `req-box ${found[4] ? 'met' : ''}`;
            
            const cargoVal = document.getElementById('cargo-val');
            const cargoHud = document.getElementById('cargo-hud');
            if (found[4]) {
                let currentCargo = 0;
                dice.forEach((v, i) => { if(!locked[i]) currentCargo += v; });
                cargoVal.innerText = currentCargo;
                cargoHud.classList.remove('opacity-0');
            } else {
                cargoHud.classList.add('opacity-0');
            }

            document.getElementById('bank-btn').classList.toggle('hidden', !found[4] || rollsCount >= 3 || rollsCount === 0);
            
            if (players[turnIndex]) {
                document.getElementById('log').innerText = `${players[turnIndex].name}'s turn`;
            }

            _checkGameEnd();
            _updateTurnUI();
        }

        function _updateTurnUI() {
            if (mpMode === 'single') return;
            document.getElementById('lcr-mp-active-banner')?.remove();
            document.getElementById('lcr-mp-spectator-banner')?.remove();
            
            const isMine = myPlayerIndex === turnIndex;
            document.getElementById('roll-btn').disabled = !isMine;
            
            if (isMine) LCRMultiplayer.UI.showActiveTurnBanner();
            else if (players[turnIndex]) LCRMultiplayer.UI.showSpectatorBanner(players[turnIndex].name);
        }

        function _checkGameEnd() {
            if (players.length === 2 && players[1].score > 0 && turnIndex === 0 && rollsCount === 0) {
                const p1 = players[0];
                const p2 = players[1];
                let winMsg = p1.score > p2.score ? `${p1.name} Wins!` : (p2.score > p1.score ? `${p2.name} Wins!` : "Stalemate!");
                document.getElementById('log').innerHTML = `<span class="text-gold font-bold">${winMsg}</span>`;
                document.getElementById('roll-btn').disabled = true;
            }
        }

        function _showGamePin(pin) {
            const ex = document.getElementById('pin-disp');
            if (ex) ex.remove();
            const el = document.createElement('div');
            el.id = 'pin-disp';
            el.style.cssText = 'position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.8);color:var(--gold);padding:5px 10px;border-radius:5px;font-size:10px;border:1px solid var(--gold);z-index:100';
            el.innerText = `PIN: ${pin}`;
            document.body.appendChild(el);
        }

        function _shareLink(pin) {
            const url = window.location.href.split('#')[0] + '#LCP:' + pin;
            navigator.clipboard.writeText(url).then(() => LCRMultiplayer.UI.showToast('Invite Copied!'));
        }
    </script>
</body>
</html>
