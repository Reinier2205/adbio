<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Captain's Table - High Roller Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --felt-green: #0a4821;
            --gold: #d4af37;
            --gold-light: #ffd700;
            --glass: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #051a0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #fff8e1;
        }

        .casino-container {
            background: var(--felt-green);
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 70%);
            border: 10px solid #2c1a12;
            box-shadow: 0 0 0 2px var(--gold), 0 30px 60px rgba(0,0,0,0.9);
            border-radius: 30px;
            width: 95vw;
            height: 92vh;
            max-width: 400px;
            max-height: 800px;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 12px;
        }

        .cinzel { font-family: 'Cinzel', serif; }

        /* Vitality Orbs */
        .duel-dashboard {
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
        }

        .player-status {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s;
            opacity: 0.5;
        }

        .player-status.active-turn {
            opacity: 1;
            transform: scale(1.1);
        }

        .orb-outer {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: #111;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .orb-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 0.8s ease-out;
        }

        .wave {
            position: absolute;
            top: -10px;
            left: -50%;
            width: 200%;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 40%;
            animation: rotate 4s infinite linear;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Dice Styles */
        .die {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1a0f12;
            font-size: 26px;
            font-weight: 900;
            box-shadow: 0 4px 0 #bbb;
            transition: all 0.2s;
        }

        .die.locked {
            background: var(--gold-light);
            box-shadow: 0 0 20px var(--gold-light), 0 2px 0 #b8860b;
            transform: translateY(-5px);
            border: 2px solid white;
        }

        .die.cargo {
            background: #222;
            color: var(--gold);
            border: 1px solid var(--gold);
            box-shadow: 0 4px 0 #000;
        }

        .rolling { animation: jitter 0.1s infinite; }
        @keyframes jitter {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 1px); }
        }

        .manifest-hud {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .req-box {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid transparent;
            opacity: 0.3;
            transition: 0.3s;
        }

        .req-box.met {
            opacity: 1;
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .btn-action {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            color: #2e1a05;
            font-weight: 900;
            text-transform: uppercase;
            padding: 16px;
            border-radius: 50px;
            width: 100%;
            box-shadow: 0 5px 0 #6e4e08;
            font-size: 16px;
        }

        .btn-action:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6e4e08;
        }

        .btn-action:disabled {
            filter: grayscale(1);
            opacity: 0.5;
            box-shadow: none;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="casino-container">
        <!-- Dashboard -->
        <div class="duel-dashboard">
            <div id="p1-ui" class="player-status active-turn">
                <span id="p1-name-display" class="text-[10px] uppercase font-bold text-teal-400 mb-1">P1</span>
                <div class="orb-outer border-teal-500">
                    <div id="p1-fill" class="orb-fill bg-teal-500" style="height: 0%">
                        <div class="wave"></div>
                    </div>
                </div>
                <div id="p1-score-display" class="cinzel text-xl mt-1">--</div>
            </div>

            <div class="cinzel text-gold text-xs">VS</div>

            <div id="p2-ui" class="player-status">
                <span id="p2-name-display" class="text-[10px] uppercase font-bold text-red-400 mb-1">P2</span>
                <div class="orb-outer border-red-500">
                    <div id="p2-fill" class="orb-fill bg-red-600" style="height: 0%">
                        <div class="wave"></div>
                    </div>
                </div>
                <div id="p2-score-display" class="cinzel text-xl mt-1">--</div>
            </div>
        </div>

        <!-- Info Bar -->
        <div id="log" class="text-center text-[10px] text-gold/60 tracking-widest uppercase py-2">Welcome to the table</div>

        <!-- Table -->
        <div class="flex-1 flex flex-direction: column justify-center items-center">
            <div id="dice-container" class="flex flex-wrap justify-center gap-4">
                <!-- Dice generated by JS -->
            </div>
            
            <div id="cargo-hud" class="mt-8 text-center hidden">
                <p class="text-[10px] text-white/40 uppercase tracking-widest">Cargo Points</p>
                <h2 id="cargo-val" class="cinzel text-5xl text-white">0</h2>
            </div>
        </div>

        <!-- Requirements -->
        <div class="manifest-hud">
            <div id="req-6" class="req-box">
                <span class="block text-[8px] uppercase text-gold">Ship</span>
                <span class="cinzel text-2xl">6</span>
            </div>
            <div id="req-5" class="req-box">
                <span class="block text-[8px] uppercase text-gold">Captain</span>
                <span class="cinzel text-2xl">5</span>
            </div>
            <div id="req-4" class="req-box">
                <span class="block text-[8px] uppercase text-gold">Crew</span>
                <span class="cinzel text-2xl">4</span>
            </div>
        </div>

        <!-- Control -->
        <div class="space-y-3 pb-4">
            <div class="text-center">
                <span id="roll-label" class="text-[10px] bg-black/40 px-3 py-1 rounded-full text-zinc-400 uppercase tracking-widest">Roll 1 / 3</span>
            </div>
            <button id="roll-btn" class="btn-action" onclick="roll()">Cast Dice</button>
            <button id="bank-btn" class="hidden w-full text-xs text-white/40 underline uppercase tracking-tighter" onclick="bank()">Keep current cargo</button>
        </div>

        <!-- Start Modal -->
        <div id="start-modal" class="overlay">
            <div class="text-center max-w-xs w-full">
                <h1 class="cinzel text-4xl text-gold mb-6">Ship, Captain, Crew</h1>
                <input type="text" id="p1-in" placeholder="Player 1" class="w-full bg-white/5 border border-gold/30 p-4 rounded-xl text-white mb-3 outline-none">
                <input type="text" id="p2-in" placeholder="Player 2" class="w-full bg-white/5 border border-gold/30 p-4 rounded-xl text-white mb-8 outline-none">
                <button class="btn-action" onclick="initGame()">Start Duel</button>
            </div>
        </div>

        <!-- Finish Modal -->
        <div id="end-modal" class="overlay hidden">
            <h2 id="winner-name" class="cinzel text-5xl text-white text-center">WINNER</h2>
            <p id="winner-desc" class="text-gold mt-4 uppercase tracking-widest text-xs"></p>
            <button class="btn-action mt-12 max-w-xs" onclick="location.reload()">New Voyage</button>
        </div>
    </div>

    <script>
        let gameState = {
            players: [{ name: "P1", score: 0 }, { name: "P2", score: 0 }],
            activeIdx: 0,
            rolls: 0,
            dice: [0, 0, 0, 0, 0],
            locked: [false, false, false, false, false], // Ship, Capt, Crew
            found: { 6: false, 5: false, 4: false },
            isRolling: false
        };

        function initGame() {
            gameState.players[0].name = document.getElementById('p1-in').value || "Player 1";
            gameState.players[1].name = document.getElementById('p2-in').value || "Player 2";
            document.getElementById('p1-name-display').innerText = gameState.players[0].name;
            document.getElementById('p2-name-display').innerText = gameState.players[1].name;
            document.getElementById('start-modal').classList.add('hidden');
            resetTurn();
        }

        function resetTurn() {
            gameState.rolls = 0;
            gameState.dice = [1, 1, 1, 1, 1];
            gameState.locked = [false, false, false, false, false];
            gameState.found = { 6: false, 5: false, 4: false };
            
            document.getElementById('p1-ui').classList.toggle('active-turn', gameState.activeIdx === 0);
            document.getElementById('p2-ui').classList.toggle('active-turn', gameState.activeIdx === 1);
            document.getElementById('roll-label').innerText = "Roll 1 / 3";
            document.getElementById('cargo-hud').classList.add('hidden');
            document.getElementById('bank-btn').classList.add('hidden');
            document.getElementById('roll-btn').disabled = false;
            
            [6, 5, 4].forEach(n => document.getElementById(`req-${n}`).classList.remove('met'));
            updateLog(`${gameState.players[gameState.activeIdx].name}'s Turn`);
            drawDice();
        }

        function updateLog(msg) { document.getElementById('log').innerText = msg; }

        async function roll() {
            if (gameState.isRolling || gameState.rolls >= 3) return;
            gameState.isRolling = true;
            gameState.rolls++;
            document.getElementById('roll-label').innerText = `Roll ${gameState.rolls} / 3`;

            // Shuffle Animation
            for (let i = 0; i < 10; i++) {
                gameState.dice = gameState.dice.map((val, idx) => {
                    return gameState.locked[idx] ? val : Math.floor(Math.random() * 6) + 1;
                });
                drawDice(true);
                await new Promise(r => setTimeout(r, 50));
            }

            processDice();
            drawDice(false);
            gameState.isRolling = false;

            if (gameState.rolls >= 3) {
                document.getElementById('roll-btn').disabled = true;
                setTimeout(bank, 1000);
            }
        }

        function processDice() {
            // Sequence Logic: Must find 6, then 5, then 4.
            // Check for 6
            if (!gameState.found[6]) {
                const idx = gameState.dice.findIndex((v, i) => v === 6 && !gameState.locked[i]);
                if (idx !== -1) {
                    gameState.found[6] = true;
                    gameState.locked[idx] = true;
                    document.getElementById('req-6').classList.add('met');
                }
            }
            // Check for 5 (only if 6 is found)
            if (gameState.found[6] && !gameState.found[5]) {
                const idx = gameState.dice.findIndex((v, i) => v === 5 && !gameState.locked[i]);
                if (idx !== -1) {
                    gameState.found[5] = true;
                    gameState.locked[idx] = true;
                    document.getElementById('req-5').classList.add('met');
                }
            }
            // Check for 4 (only if 5 is found)
            if (gameState.found[5] && !gameState.found[4]) {
                const idx = gameState.dice.findIndex((v, i) => v === 4 && !gameState.locked[i]);
                if (idx !== -1) {
                    gameState.found[4] = true;
                    gameState.locked[idx] = true;
                    document.getElementById('req-4').classList.add('met');
                }
            }

            if (gameState.found[4]) {
                document.getElementById('cargo-hud').classList.remove('hidden');
                if (gameState.rolls < 3) document.getElementById('bank-btn').classList.remove('hidden');
                
                let cargoTotal = 0;
                gameState.dice.forEach((v, i) => {
                    if (!gameState.locked[i]) cargoTotal += v;
                });
                document.getElementById('cargo-val').innerText = cargoTotal;
            }
        }

        function drawDice(isShuffling) {
            const container = document.getElementById('dice-container');
            container.innerHTML = '';
            gameState.dice.forEach((val, i) => {
                const d = document.createElement('div');
                let type = "";
                if (gameState.locked[i]) type = "locked";
                else if (gameState.found[4]) type = "cargo";
                
                d.className = `die ${type} ${isShuffling && !gameState.locked[i] ? 'rolling' : ''}`;
                d.innerText = val;
                container.appendChild(d);
            });
        }

        function bank() {
            const score = gameState.found[4] ? parseInt(document.getElementById('cargo-val').innerText) : 0;
            gameState.players[gameState.activeIdx].score = score;
            
            const fill = document.getElementById(`p${gameState.activeIdx + 1}-fill`);
            const display = document.getElementById(`p${gameState.activeIdx + 1}-score-display`);
            
            display.innerText = score;
            fill.style.height = `${(score / 12) * 100}%`;

            if (gameState.activeIdx === 0) {
                gameState.activeIdx = 1;
                setTimeout(resetTurn, 800);
            } else {
                showResults();
            }
        }

        function showResults() {
            const p1 = gameState.players[0];
            const p2 = gameState.players[1];
            document.getElementById('end-modal').classList.remove('hidden');
            
            let winTitle = "";
            let winDesc = "";
            
            if (p1.score > p2.score) {
                winTitle = p1.name;
                winDesc = `Victorious with ${p1.score} cargo points`;
            } else if (p2.score > p1.score) {
                winTitle = p2.name;
                winDesc = `Victory claimed with ${p2.score} cargo points`;
            } else {
                winTitle = "STALEMATE";
                winDesc = `Both captains hauled ${p1.score} points`;
            }
            
            document.getElementById('winner-name').innerText = winTitle;
            document.getElementById('winner-desc').innerText = winDesc;
        }
    </script>
</body>
</html>
