<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a4821"/>
  <rect x="2" y="2" width="96" height="96" rx="11" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>

  <!-- Chat bubble body -->
  <rect x="12" y="18" width="64" height="44" rx="8" fill="#2a1a1f" stroke="#d4af37" stroke-width="2"/>
  <!-- Bubble tail -->
  <polygon points="24,62 18,74 34,62" fill="#2a1a1f" stroke="#d4af37" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- AI spark / star icon -->
  <text x="44" y="48" text-anchor="middle" font-size="26" font-family="Arial,sans-serif" fill="#ffd700">✦</text>

  <!-- Text lines inside bubble -->
  <rect x="20" y="24" width="48" height="4" rx="2" fill="#d4af37" opacity="0.6"/>
  <rect x="20" y="32" width="36" height="4" rx="2" fill="#d4af37" opacity="0.35"/>

  <!-- Label -->
  <text x="50" y="86" text-anchor="middle" font-size="7.5" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700" letter-spacing="0.5">AI PROMPTER</text>
  <text x="50" y="96" text-anchor="middle" font-size="6" font-family="Arial,sans-serif" fill="#d4af37" opacity="0.7">Project Manager</text>
</svg>
