<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a4821"/>
  <!-- Gold border glow -->
  <rect x="2" y="2" width="96" height="96" rx="11" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>

  <!-- Bookmark ribbons -->
  <polygon points="22,12 36,12 36,52 29,44 22,52" fill="#008080" stroke="#d4af37" stroke-width="1.5"/>
  <polygon points="34,18 48,18 48,58 41,50 34,58" fill="#800000" stroke="#d4af37" stroke-width="1.5"/>
  <polygon points="46,10 60,10 60,50 53,42 46,50" fill="#d4af37" stroke="#b8860b" stroke-width="1.5"/>

  <!-- Chain link icon -->
  <rect x="58" y="56" width="18" height="10" rx="5" fill="none" stroke="#ffd700" stroke-width="2.5"/>
  <rect x="68" y="62" width="18" height="10" rx="5" fill="none" stroke="#ffd700" stroke-width="2.5"/>
  <line x1="67" y1="61" x2="77" y2="67" stroke="#0a4821" stroke-width="3"/>

  <!-- Label -->
  <text x="50" y="80" text-anchor="middle" font-size="7" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700" letter-spacing="0.5">SAVE MY</text>
  <text x="50" y="91" text-anchor="middle" font-size="7" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700" letter-spacing="0.5">LINKS</text>
</svg>
