<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a4821"/>

  <!-- Center pot / chip pile -->
  <ellipse cx="50" cy="58" rx="14" ry="6" fill="#d4af37" opacity="0.9"/>
  <ellipse cx="50" cy="55" rx="14" ry="6" fill="#ffd700"/>
  <ellipse cx="50" cy="52" rx="14" ry="6" fill="#d4af37"/>
  <text x="50" y="56" text-anchor="middle" font-size="7" font-family="Arial Black,sans-serif" font-weight="900" fill="#2a1a1f">POT</text>

  <!-- Left die (teal) -->
  <rect x="8" y="30" width="28" height="28" rx="5" fill="#008080" stroke="#d4af37" stroke-width="2"/>
  <!-- L pip pattern (3 pips) -->
  <circle cx="16" cy="38" r="3" fill="#fff8e1"/>
  <circle cx="28" cy="44" r="3" fill="#fff8e1"/>
  <circle cx="16" cy="50" r="3" fill="#fff8e1"/>
  <!-- L label -->
  <text x="22" y="68" text-anchor="middle" font-size="9" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700">L</text>

  <!-- Right die (maroon) -->
  <rect x="64" y="30" width="28" height="28" rx="5" fill="#800000" stroke="#d4af37" stroke-width="2"/>
  <!-- R pip pattern (4 pips) -->
  <circle cx="72" cy="38" r="3" fill="#fff8e1"/>
  <circle cx="84" cy="38" r="3" fill="#fff8e1"/>
  <circle cx="72" cy="50" r="3" fill="#fff8e1"/>
  <circle cx="84" cy="50" r="3" fill="#fff8e1"/>
  <!-- R label -->
  <text x="78" y="68" text-anchor="middle" font-size="9" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700">R</text>

  <!-- Center die (gold) above pot -->
  <rect x="38" y="14" width="24" height="24" rx="4" fill="#d4af37" stroke="#fff8e1" stroke-width="1.5"/>
  <!-- C pip pattern (center dot) -->
  <circle cx="50" cy="26" r="3.5" fill="#2a1a1f"/>
  <!-- C label -->
  <text x="50" y="46" text-anchor="middle" font-size="9" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700">C</text>

  <!-- Arrows: left and right -->
  <text x="36" y="50" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#fff8e1" opacity="0.7">←</text>
  <text x="64" y="50" text-anchor="middle" font-size="10" font-family="Arial,sans-serif" fill="#fff8e1" opacity="0.7">→</text>

  <!-- LCR label -->
  <text x="50" y="97" text-anchor="middle" font-size="10" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700" letter-spacing="2">LCR</text>
</svg>
