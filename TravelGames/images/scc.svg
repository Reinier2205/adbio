<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0d5c2e"/>
      <stop offset="100%" stop-color="#0a4821"/>
    </radialGradient>
    <radialGradient id="die-teal" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#00b3b3"/>
      <stop offset="100%" stop-color="#008080"/>
    </radialGradient>
    <radialGradient id="die-maroon" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#b30000"/>
      <stop offset="100%" stop-color="#800000"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="url(#bg)"/>
  <rect width="100" height="100" rx="12" fill="none" stroke="#d4af37" stroke-width="3"/>

  <!-- Ship (anchor icon) -->
  <text x="50" y="22" text-anchor="middle" font-size="14" fill="#ffd700">⚓</text>

  <!-- Three dice row -->
  <!-- Die 1 — teal (6 = Ship) -->
  <rect x="8" y="28" width="24" height="24" rx="4" fill="url(#die-teal)" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>
  <!-- pips for 6 -->
  <circle cx="14" cy="34" r="2" fill="#fff8e1"/><circle cx="26" cy="34" r="2" fill="#fff8e1"/>
  <circle cx="14" cy="40" r="2" fill="#fff8e1"/><circle cx="26" cy="40" r="2" fill="#fff8e1"/>
  <circle cx="14" cy="46" r="2" fill="#fff8e1"/><circle cx="26" cy="46" r="2" fill="#fff8e1"/>

  <!-- Die 2 — teal (5 = Captain) -->
  <rect x="38" y="28" width="24" height="24" rx="4" fill="url(#die-teal)" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>
  <!-- pips for 5 -->
  <circle cx="44" cy="34" r="2" fill="#fff8e1"/><circle cx="56" cy="34" r="2" fill="#fff8e1"/>
  <circle cx="50" cy="40" r="2" fill="#fff8e1"/>
  <circle cx="44" cy="46" r="2" fill="#fff8e1"/><circle cx="56" cy="46" r="2" fill="#fff8e1"/>

  <!-- Die 3 — maroon (4 = Crew / cargo) -->
  <rect x="68" y="28" width="24" height="24" rx="4" fill="url(#die-maroon)" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>
  <!-- pips for 4 -->
  <circle cx="74" cy="34" r="2" fill="#fff8e1"/><circle cx="86" cy="34" r="2" fill="#fff8e1"/>
  <circle cx="74" cy="46" r="2" fill="#fff8e1"/><circle cx="86" cy="46" r="2" fill="#fff8e1"/>

  <!-- Labels -->
  <text x="20" y="60" text-anchor="middle" font-family="serif" font-size="5.5" font-weight="bold" fill="#ffd700">SHIP</text>
  <text x="50" y="60" text-anchor="middle" font-family="serif" font-size="5.5" font-weight="bold" fill="#ffd700">CAPTAIN</text>
  <text x="80" y="60" text-anchor="middle" font-family="serif" font-size="5.5" font-weight="bold" fill="#ffd700">CREW</text>

  <!-- Divider -->
  <line x1="10" y1="65" x2="90" y2="65" stroke="#d4af37" stroke-width="0.75" stroke-dasharray="3,2"/>

  <!-- Title -->
  <text x="50" y="76" text-anchor="middle" font-family="serif" font-size="8" font-weight="bold" fill="#ffd700">The Captain's</text>
  <text x="50" y="87" text-anchor="middle" font-family="serif" font-size="8" font-weight="bold" fill="#ffd700">Table</text>

  <!-- Cargo score hint -->
  <text x="50" y="97" text-anchor="middle" font-family="sans-serif" font-size="5" fill="rgba(255,248,225,0.5)">Roll · Lock · Score</text>
</svg>
