<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a4821"/>
      <stop offset="100%" stop-color="#2a1a1f"/>
    </linearGradient>
    <radialGradient id="logGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#4a2500"/>
    </radialGradient>
    <radialGradient id="logGrad2" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a0522d"/>
      <stop offset="100%" stop-color="#5c3010"/>
    </radialGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="13" fill="url(#bg)"/>

  <!-- Border glow -->
  <rect x="2" y="2" width="96" height="96" rx="12" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>

  <!-- Log pile — three stacked logs (end-on view) -->
  <!-- Bottom log -->
  <ellipse cx="50" cy="72" rx="28" ry="9" fill="url(#logGrad)"/>
  <ellipse cx="50" cy="72" rx="20" ry="5" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="50" cy="72" rx="12" ry="3" fill="none" stroke="#d4af37" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="50" cy="72" rx="5"  ry="1.5" fill="#d4af37" opacity="0.35"/>

  <!-- Middle log -->
  <ellipse cx="50" cy="60" rx="24" ry="8" fill="url(#logGrad2)"/>
  <ellipse cx="50" cy="60" rx="17" ry="4.5" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="50" cy="60" rx="9"  ry="2.5" fill="none" stroke="#d4af37" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="50" cy="60" rx="3.5" ry="1.2" fill="#d4af37" opacity="0.35"/>

  <!-- Top log -->
  <ellipse cx="50" cy="49" rx="20" ry="7" fill="url(#logGrad)"/>
  <ellipse cx="50" cy="49" rx="14" ry="4" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="50" cy="49" rx="7"  ry="2" fill="none" stroke="#d4af37" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="50" cy="49" rx="3"  ry="1" fill="#d4af37" opacity="0.35"/>

  <!-- R/kg gold price tag pill -->
  <rect x="26" y="18" width="48" height="16" rx="8" fill="url(#goldBar)"/>
  <text x="50" y="29.5" text-anchor="middle" font-family="'Georgia',serif" font-weight="700" font-size="8.5" fill="#2a1a1f">R / kg</text>

  <!-- Small scale/compare icon: two tick marks -->
  <line x1="22" y1="86" x2="22" y2="94" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="90" x2="26" y2="90" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="78" y1="86" x2="78" y2="94" stroke="#008080" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="74" y1="90" x2="82" y2="90" stroke="#008080" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="90" x2="76" y2="90" stroke="#d4af37" stroke-width="0.7" stroke-dasharray="3,2" opacity="0.5"/>
</svg>
