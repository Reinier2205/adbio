<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a4821"/>
      <stop offset="100%" stop-color="#2a1a1f"/>
    </linearGradient>
    <linearGradient id="speedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="url(#bg)" stroke="#d4af37" stroke-width="2" opacity="0.8"/>
  
  <!-- Speedometer arc -->
  <path d="M20,70 A30,30 0 0,1 80,70" fill="none" stroke="url(#speedGradient)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Needle -->
  <line x1="50" y1="70" x2="50" y2="30" stroke="#fff8e1" stroke-width="3" stroke-linecap="round" transform="rotate(45,50,70)"/>
  
  <!-- Center circle -->
  <circle cx="50" cy="70" r="5" fill="#fff8e1"/>
  
  <!-- Speed display -->
  <rect x="30" y="20" width="40" height="25" rx="4" fill="rgba(0,0,0,0.5)" stroke="#d4af37" stroke-width="1"/>
  <text x="50" y="38" text-anchor="middle" font-family="Orbitron, sans-serif" font-size="14" font-weight="bold" fill="#22c55e">60</text>
  
  <!-- KM/H text -->
  <text x="50" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="6" fill="rgba(255,255,255,0.7)">KM/H</text>
  
  <!-- Compass -->
  <circle cx="50" cy="85" r="8" fill="none" stroke="#d4af37" stroke-width="1.5"/>
  <line x1="50" y1="77" x2="50" y2="85" stroke="#fff8e1" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="50,77 48,80 52,80" fill="#fff8e1"/>
  
  <!-- Tool name -->
  <text x="50" y="95" text-anchor="middle" font-family="Cinzel, serif" font-size="7" font-weight="bold" fill="#d4af37">SPEED</text>
</svg>