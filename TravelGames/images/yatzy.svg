<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background felt -->
  <rect width="100" height="100" rx="12" fill="#0a4821"/>

  <!-- Die 1 (back-left) -->
  <rect x="6" y="28" width="46" height="46" rx="8" fill="#fff8e1" stroke="#d4af37" stroke-width="2.5"/>
  <!-- 5 pips on die 1 -->
  <circle cx="18" cy="40" r="4.2" fill="#1a1a1a"/>
  <circle cx="38" cy="40" r="4.2" fill="#1a1a1a"/>
  <circle cx="28" cy="51" r="4.2" fill="#1a1a1a"/>
  <circle cx="18" cy="62" r="4.2" fill="#1a1a1a"/>
  <circle cx="38" cy="62" r="4.2" fill="#1a1a1a"/>

  <!-- Die 2 (front-right, overlapping) -->
  <rect x="48" y="26" width="46" height="46" rx="8" fill="#fff8e1" stroke="#d4af37" stroke-width="2.5"/>
  <!-- 5 pips on die 2 -->
  <circle cx="60" cy="38" r="4.2" fill="#1a1a1a"/>
  <circle cx="80" cy="38" r="4.2" fill="#1a1a1a"/>
  <circle cx="70" cy="49" r="4.2" fill="#1a1a1a"/>
  <circle cx="60" cy="60" r="4.2" fill="#1a1a1a"/>
  <circle cx="80" cy="60" r="4.2" fill="#1a1a1a"/>

  <!-- Gold star badge bottom-right -->
  <circle cx="78" cy="78" r="14" fill="#d4af37"/>
  <text x="78" y="83" text-anchor="middle" font-size="16" font-family="Arial Black, sans-serif" font-weight="900" fill="#1a1a1a">5</text>

  <!-- YATZY label -->
  <text x="50" y="97" text-anchor="middle" font-size="10" font-family="Arial Black, sans-serif" font-weight="900" fill="#ffd700" letter-spacing="1.5">YATZY</text>
</svg>
