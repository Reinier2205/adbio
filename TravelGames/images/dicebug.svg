<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background felt -->
  <rect width="100" height="100" rx="12" fill="#0a4821"/>

  <!-- Bug body (large oval) -->
  <ellipse cx="50" cy="62" rx="18" ry="26" fill="#008080" stroke="#d4af37" stroke-width="2"/>
  <!-- Body centre line -->
  <line x1="50" y1="37" x2="50" y2="87" stroke="#005f5f" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Bug head -->
  <circle cx="50" cy="28" r="12" fill="#008080" stroke="#d4af37" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="45" cy="26" r="3.5" fill="white" stroke="#005f5f" stroke-width="1"/>
  <circle cx="45.5" cy="26" r="2" fill="#111"/>
  <circle cx="55" cy="26" r="3.5" fill="white" stroke="#005f5f" stroke-width="1"/>
  <circle cx="55.5" cy="26" r="2" fill="#111"/>

  <!-- Antennae -->
  <line x1="45" y1="17" x2="36" y2="6" stroke="#d4af37" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="35" cy="5" r="2.5" fill="#ffd700"/>
  <line x1="55" y1="17" x2="64" y2="6" stroke="#d4af37" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="65" cy="5" r="2.5" fill="#ffd700"/>

  <!-- Legs left -->
  <line x1="33" y1="52" x2="16" y2="44" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="62" x2="14" y2="62" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="72" x2="16" y2="80" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs right -->
  <line x1="67" y1="52" x2="84" y2="44" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
  <line x1="67" y1="62" x2="86" y2="62" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>
  <line x1="67" y1="72" x2="84" y2="80" stroke="#d4af37" stroke-width="2" stroke-linecap="round"/>

  <!-- Tail -->
  <ellipse cx="50" cy="91" rx="5" ry="6" fill="#008080" stroke="#d4af37" stroke-width="1.5"/>

  <!-- Die (small, top-right corner) -->
  <rect x="70" y="2" width="26" height="26" rx="5" fill="#fff8e1" stroke="#d4af37" stroke-width="1.8"/>
  <circle cx="76" cy="8"  r="2.2" fill="#1a1a1a"/>
  <circle cx="83" cy="15" r="2.2" fill="#1a1a1a"/>
  <circle cx="90" cy="22" r="2.2" fill="#1a1a1a"/>

  <!-- Label -->
  <text x="50" y="99" text-anchor="middle" font-size="9" font-family="Arial Black, sans-serif" font-weight="900" fill="#ffd700" letter-spacing="1.5">DICE BUG</text>
</svg>
