<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a4821"/>
      <stop offset="100%" style="stop-color:#2a1a1f"/>
    </linearGradient>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a"/>
      <stop offset="100%" style="stop-color:#0d2a1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="url(#bg)"/>

  <!-- Map background panel -->
  <rect x="8" y="8" width="84" height="48" rx="6" fill="url(#mapGrad)" stroke="#d4af37" stroke-width="1.5"/>

  <!-- Map grid lines (latitude/longitude feel) -->
  <line x1="8" y1="24" x2="92" y2="24" stroke="#d4af3730" stroke-width="0.5"/>
  <line x1="8" y1="40" x2="92" y2="40" stroke="#d4af3730" stroke-width="0.5"/>
  <line x1="30" y1="8" x2="30" y2="56" stroke="#d4af3730" stroke-width="0.5"/>
  <line x1="55" y1="8" x2="55" y2="56" stroke="#d4af3730" stroke-width="0.5"/>
  <line x1="78" y1="8" x2="78" y2="56" stroke="#d4af3730" stroke-width="0.5"/>

  <!-- Continent blobs (simplified) -->
  <!-- Africa -->
  <ellipse cx="52" cy="34" rx="7" ry="10" fill="#1e5c35" opacity="0.7"/>
  <!-- Europe -->
  <ellipse cx="50" cy="20" rx="6" ry="5" fill="#1e5c35" opacity="0.7"/>
  <!-- Americas -->
  <ellipse cx="25" cy="30" rx="6" ry="11" fill="#1e5c35" opacity="0.7"/>
  <!-- Asia -->
  <ellipse cx="72" cy="24" rx="10" ry="8" fill="#1e5c35" opacity="0.7"/>
  <!-- Australia -->
  <ellipse cx="78" cy="42" rx="5" ry="4" fill="#1e5c35" opacity="0.7"/>

  <!-- Map markers (gold pins) -->
  <circle cx="25" cy="28" r="3" fill="#d4af37" stroke="#2a1a1f" stroke-width="0.8"/>
  <circle cx="50" cy="19" r="3" fill="#d4af37" stroke="#2a1a1f" stroke-width="0.8"/>
  <circle cx="72" cy="22" r="3" fill="#d4af37" stroke="#2a1a1f" stroke-width="0.8"/>
  <!-- Selected marker (gold star glow) -->
  <circle cx="52" cy="34" r="4.5" fill="#ffd700" stroke="#2a1a1f" stroke-width="1"/>
  <text x="52" y="37" text-anchor="middle" font-size="5" fill="#2a1a1f">★</text>

  <!-- Connector lines from markers to price table -->
  <line x1="25" y1="31" x2="20" y2="58" stroke="#d4af3760" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="52" y1="38" x2="50" y2="58" stroke="#ffd70080" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="72" y1="25" x2="78" y2="58" stroke="#d4af3760" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Price comparison table -->
  <rect x="8" y="60" width="84" height="32" rx="5" fill="#1a0f12" stroke="#d4af37" stroke-width="1.2"/>

  <!-- Table header -->
  <rect x="8" y="60" width="84" height="9" rx="5" fill="#d4af37"/>
  <rect x="8" y="65" width="84" height="4" fill="#d4af37"/>
  <text x="22" y="67" text-anchor="middle" font-size="4.5" font-weight="bold" fill="#2a1a1f">ITEM</text>
  <text x="50" y="67" text-anchor="middle" font-size="4.5" font-weight="bold" fill="#2a1a1f">HOME</text>
  <text x="68" y="67" text-anchor="middle" font-size="4.5" font-weight="bold" fill="#2a1a1f">DEST</text>
  <text x="85" y="67" text-anchor="middle" font-size="4.5" font-weight="bold" fill="#2a1a1f">CONV</text>

  <!-- Row 1 -->
  <text x="14" y="76" font-size="4" fill="#fff8e1">☕ Coffee</text>
  <text x="50" y="76" text-anchor="middle" font-size="4" fill="#cc4444">R39</text>
  <text x="68" y="76" text-anchor="middle" font-size="4" fill="#008080">€3.50</text>
  <text x="85" y="76" text-anchor="middle" font-size="4" font-weight="bold" fill="#ffd700">R70</text>

  <!-- Row 2 -->
  <text x="14" y="84" font-size="4" fill="#fff8e1">🍺 Beer</text>
  <text x="50" y="84" text-anchor="middle" font-size="4" fill="#cc4444">R40</text>
  <text x="68" y="84" text-anchor="middle" font-size="4" fill="#008080">€5.00</text>
  <text x="85" y="84" text-anchor="middle" font-size="4" font-weight="bold" fill="#ffd700">R100</text>

  <!-- Row 3 -->
  <text x="14" y="92" font-size="4" fill="#fff8e1">⛽ Fuel</text>
  <text x="50" y="92" text-anchor="middle" font-size="4" fill="#cc4444">R27</text>
  <text x="68" y="92" text-anchor="middle" font-size="4" fill="#008080">€1.85</text>
  <text x="85" y="92" text-anchor="middle" font-size="4" font-weight="bold" fill="#ffd700">R37</text>

  <!-- Gold border glow -->
  <rect x="1" y="1" width="98" height="98" rx="13" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
</svg>
