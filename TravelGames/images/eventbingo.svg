<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a4821"/>
  <!-- Gold border glow -->
  <rect x="2" y="2" width="96" height="96" rx="11" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>

  <!-- Bingo card grid (4x4) -->
  <rect x="14" y="20" width="72" height="58" rx="5" fill="#2a1a1f" stroke="#d4af37" stroke-width="1.5"/>

  <!-- Column headers B I N G O -->
  <text x="23" y="33" text-anchor="middle" font-size="8" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700">B</text>
  <text x="35" y="33" text-anchor="middle" font-size="8" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700">I</text>
  <text x="47" y="33" text-anchor="middle" font-size="8" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700">N</text>
  <text x="59" y="33" text-anchor="middle" font-size="8" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700">G</text>
  <text x="71" y="33" text-anchor="middle" font-size="8" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700">O</text>

  <!-- Header underline -->
  <line x1="16" y1="36" x2="84" y2="36" stroke="#d4af37" stroke-width="1"/>

  <!-- Grid cells — row 1 -->
  <circle cx="23" cy="44" r="5" fill="#008080"/>
  <circle cx="35" cy="44" r="5" fill="#2a1a1f" stroke="#d4af37" stroke-width="1"/>
  <circle cx="47" cy="44" r="5" fill="#008080"/>
  <circle cx="59" cy="44" r="5" fill="#2a1a1f" stroke="#d4af37" stroke-width="1"/>
  <circle cx="71" cy="44" r="5" fill="#008080"/>

  <!-- Row 2 -->
  <circle cx="23" cy="56" r="5" fill="#2a1a1f" stroke="#d4af37" stroke-width="1"/>
  <circle cx="35" cy="56" r="5" fill="#008080"/>
  <!-- FREE star -->
  <circle cx="47" cy="56" r="5" fill="#d4af37"/>
  <text x="47" y="59" text-anchor="middle" font-size="6" font-family="Arial,sans-serif" font-weight="900" fill="#2a1a1f">★</text>
  <circle cx="59" cy="56" r="5" fill="#008080"/>
  <circle cx="71" cy="56" r="5" fill="#2a1a1f" stroke="#d4af37" stroke-width="1"/>

  <!-- Row 3 -->
  <circle cx="23" cy="68" r="5" fill="#008080"/>
  <circle cx="35" cy="68" r="5" fill="#2a1a1f" stroke="#d4af37" stroke-width="1"/>
  <circle cx="47" cy="68" r="5" fill="#008080"/>
  <circle cx="59" cy="68" r="5" fill="#2a1a1f" stroke="#d4af37" stroke-width="1"/>
  <circle cx="71" cy="68" r="5" fill="#008080"/>

  <!-- Diagonal win line -->
  <line x1="18" y1="39" x2="82" y2="73" stroke="#ffd700" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Label -->
  <text x="50" y="92" text-anchor="middle" font-size="8" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700" letter-spacing="1">EVENT BINGO</text>
</svg>
