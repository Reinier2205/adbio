<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a4821"/>
      <stop offset="100%" stop-color="#2a1a1f"/>
    </linearGradient>
    <radialGradient id="fire" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="url(#bg)" stroke="#d4af37" stroke-width="2" opacity="0.8"/>
  
  <!-- Timer circle -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#d4af37" stroke-width="4" stroke-dasharray="188.5" stroke-dashoffset="47"/>
  
  <!-- Fire/flame -->
  <path d="M50,30 Q55,25 60,30 Q65,35 60,40 Q55,45 50,40 Q45,35 40,30 Q45,25 50,30" fill="url(#fire)" filter="url(#glow)"/>
  
  <!-- Timer hands -->
  <line x1="50" y1="50" x2="50" y2="30" stroke="#fff8e1" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="65" y2="50" stroke="#fff8e1" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="#fff8e1"/>
  
  <!-- Braai text -->
  <text x="50" y="85" text-anchor="middle" font-family="Cinzel, serif" font-size="10" font-weight="bold" fill="#d4af37">BRA</text>
  <text x="50" y="95" text-anchor="middle" font-family="Cinzel, serif" font-size="10" font-weight="bold" fill="#d4af37">AI</text>
</svg>