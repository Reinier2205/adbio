<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a4821"/>
  <rect x="2" y="2" width="96" height="96" rx="11" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>

  <!-- Mat -->
  <rect x="14" y="68" width="72" height="8" rx="4" fill="#008080" opacity="0.7"/>

  <!-- Pilates figure — lying on back, legs raised -->
  <!-- Body torso -->
  <ellipse cx="44" cy="64" rx="14" ry="6" fill="#ffd700" opacity="0.9"/>
  <!-- Head -->
  <circle cx="24" cy="62" r="6" fill="#ffd700"/>
  <!-- Raised legs (V shape) -->
  <line x1="56" y1="62" x2="70" y2="44" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="64" x2="76" y2="48" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  <!-- Feet -->
  <circle cx="71" cy="43" r="3" fill="#d4af37"/>
  <circle cx="77" cy="47" r="3" fill="#d4af37"/>
  <!-- Arms reaching back -->
  <line x1="24" y1="62" x2="14" y2="54" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="62" x2="12" y2="58" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>

  <!-- Gold sparkle accents -->
  <text x="82" y="28" font-size="10" font-family="Arial" fill="#ffd700" opacity="0.8">✦</text>
  <text x="10" y="30" font-size="7"  font-family="Arial" fill="#d4af37" opacity="0.6">✦</text>

  <!-- Label -->
  <text x="50" y="86" text-anchor="middle" font-size="7.5" font-family="Arial Black,sans-serif" font-weight="900" fill="#ffd700" letter-spacing="0.5">PILATES</text>
  <text x="50" y="96" text-anchor="middle" font-size="6.5" font-family="Arial Black,sans-serif" font-weight="900" fill="#d4af37" letter-spacing="0.5">FULL BODY</text>
</svg>
